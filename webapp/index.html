<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>ClaWTalk Head Studio</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d0d0d;color:#e0e0e0;font-family:system-ui,-apple-system,sans-serif;display:flex;min-height:100vh}

  /* ── Sidebar ── */
  .sidebar{width:320px;min-width:280px;background:#131313;border-right:1px solid #1e1e1e;display:flex;flex-direction:column;overflow-y:auto}
  .sidebar-header{padding:20px 20px 12px;border-bottom:1px solid #1e1e1e}
  .sidebar-header h1{font-size:16px;font-weight:700;color:#fff;letter-spacing:.4px}
  .sidebar-header p{font-size:11px;color:#444;margin-top:3px}
  .sidebar-section{padding:16px 20px;border-bottom:1px solid #1a1a1a}
  .sidebar-section label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#555;display:block;margin-bottom:8px}
  .sidebar-section textarea,
  .sidebar-section input[type=text]{width:100%;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;color:#ddd;font-size:13px;padding:8px 10px;resize:vertical;font-family:inherit;outline:none}
  .sidebar-section textarea:focus,
  .sidebar-section input:focus{border-color:#2a5}
  .preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .preset-btn{background:#1a1a1a;border:1px solid #252525;border-radius:6px;padding:7px 8px;font-size:11px;color:#888;cursor:pointer;text-align:left;line-height:1.4;transition:all .12s}
  .preset-btn:hover{background:#202020;border-color:#333;color:#bbb}
  .preset-btn.active{background:#0e2a1a;border-color:#2a6;color:#4c9}
  .generate-btn{width:100%;margin-top:12px;background:#1a4a2a;color:#4c9;border:1px solid #2a6;border-radius:7px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;transition:background .12s}
  .generate-btn:hover{background:#1e5430}
  .generate-btn:disabled{background:#1a1a1a;color:#444;border-color:#222;cursor:default}
  .status{font-size:11px;color:#555;margin-top:8px;min-height:16px}
  .status.ok{color:#4c9}
  .status.err{color:#e44}
  .status.running{color:#a8a}

  /* ── Head list ── */
  .head-list{padding:8px 12px;display:flex;flex-direction:column;gap:6px;flex:1}
  .head-card{background:#181818;border:1px solid #222;border-radius:8px;padding:8px 10px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:border-color .12s}
  .head-card:hover{border-color:#333}
  .head-card.active{border-color:#2a6;background:#0d1f14}
  .head-thumb{width:48px;height:48px;flex-shrink:0;border-radius:6px;overflow:hidden;background:#111}
  .head-thumb svg{width:48px;height:48px}
  .head-name{font-size:13px;font-weight:600;color:#ccc}
  .head-meta{font-size:11px;color:#444;margin-top:2px}

  /* ── Main area ── */
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .top-bar{padding:16px 24px;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;gap:12px}
  .top-bar h2{font-size:16px;font-weight:600;color:#ccc}
  .tab-bar{display:flex;gap:2px;margin-left:auto}
  .tab{padding:5px 14px;border-radius:5px;font-size:12px;color:#666;cursor:pointer;transition:all .12s}
  .tab:hover{color:#aaa;background:#1a1a1a}
  .tab.active{background:#1a1a1a;color:#fff;border:1px solid #2a2a2a}
  .content{flex:1;display:flex;overflow:hidden}

  /* ── Gallery tab ── */
  .gallery-tab{flex:1;overflow-y:auto;padding:24px;display:none}
  .gallery-tab.active{display:block}
  .viseme-grid{display:flex;flex-wrap:wrap;gap:16px}
  .viseme-card{background:#161616;border:1px solid #222;border-radius:10px;padding:12px;text-align:center;width:160px}
  .viseme-card svg{width:136px;height:136px;display:block;margin:0 auto}
  .viseme-label{font-size:11px;color:#666;margin-top:6px;font-family:monospace}

  /* ── Demo tab ── */
  .demo-tab{flex:1;overflow-y:auto;padding:24px;display:none;flex-direction:column;align-items:center;gap:20px}
  .demo-tab.active{display:flex}
  .stage-wrap{display:flex;align-items:flex-start;gap:24px;flex-wrap:wrap;justify-content:center}
  .stage{width:280px;height:280px;background:#1a1a1a;border-radius:16px;overflow:hidden;position:relative;border:1px solid #2a2a2a;flex-shrink:0}
  .stage svg{width:100%;height:100%;position:absolute;top:0;left:0;display:none}
  #blink-overlay{display:block;width:100%;height:100%;position:absolute;top:0;left:0;pointer-events:none;z-index:10}
  .demo-controls{display:flex;flex-direction:column;gap:12px;width:320px}
  .demo-controls label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#555;display:block;margin-bottom:6px}
  .sentence-list{display:flex;flex-direction:column;gap:5px}
  .sent-btn{background:#181818;border:1px solid #252525;border-radius:6px;padding:7px 10px;font-size:12px;color:#888;cursor:pointer;text-align:left;transition:all .12s}
  .sent-btn:hover{background:#1e1e1e;border-color:#333;color:#bbb}
  .sent-btn.active{background:#0e1e2a;border-color:#27a;color:#7cf}
  .custom-row{display:flex;gap:6px;margin-top:4px}
  .custom-row input{flex:1;background:#181818;border:1px solid #252525;border-radius:6px;padding:7px 10px;font-size:12px;color:#ccc;outline:none}
  .custom-row input:focus{border-color:#2a5}
  .custom-row button{background:#181818;border:1px solid #252525;border-radius:6px;padding:7px 14px;font-size:12px;color:#888;cursor:pointer;white-space:nowrap}
  .custom-row button:hover{background:#1e1e1e;color:#bbb}
  .playback-row{display:flex;gap:8px;align-items:center}
  .play-btn{background:#1a4a2a;color:#4c9;border:1px solid #2a6;border-radius:7px;padding:9px 22px;font-size:14px;font-weight:600;cursor:pointer}
  .play-btn:hover{background:#1e5430}
  .play-btn:disabled{background:#1a1a1a;color:#444;border-color:#222;cursor:default}
  .spd-btn{background:#181818;color:#666;border:1px solid #252525;padding:6px 11px;border-radius:6px;font-size:12px;cursor:pointer}
  .spd-btn:hover{color:#aaa}
  .spd-btn.active{background:#1a2a3a;border-color:#27a;color:#7cf}
  .progress-bar-wrap{width:100%;height:4px;background:#1e1e1e;border-radius:2px;overflow:hidden}
  .progress-bar{height:100%;background:#2a6;width:0%;transition:width .1s linear}
  .caption-box{font-size:13px;color:#666;text-align:center;min-height:40px;line-height:1.6;max-width:320px}
  .vis-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:10px;font-size:11px;font-family:monospace;background:#1a1a1a;border:1px solid #222;color:#555;transition:all .1s}
  .vis-chip.active{background:#0a1f0f;border-color:#2a6;color:#4c9}
  .chip-row{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;max-width:440px}
  .speak-status{font-size:11px;color:#444;text-align:center;min-height:14px}
</style>
</head>
<body>

<!-- ── Sidebar ─────────────────────────────────────────────────────────────── -->
<aside class="sidebar">
  <div class="sidebar-header">
    <h1>ClaWTalk Head Studio</h1>
    <p>Generate and preview avatar heads</p>
  </div>

  <div class="sidebar-section">
    <label>Presets</label>
    <div class="preset-grid" id="preset-grid"><!-- filled by JS --></div>
  </div>

  <div class="sidebar-section">
    <label>Custom style</label>
    <textarea id="custom-style" rows="3" placeholder="e.g. teenage girl, East Asian features, animated style, pink hair, big expressive eyes, flat design"></textarea>
    <input type="text" id="custom-name" placeholder="name (optional)" style="margin-top:6px"/>
    <button class="generate-btn" id="generate-btn" onclick="generateHead()">Generate head</button>
    <div class="status" id="gen-status"></div>
  </div>

  <div class="sidebar-section" style="border-bottom:none;flex:1">
    <label>Generated heads</label>
    <div class="head-list" id="head-list"><!-- filled by JS --></div>
  </div>
</aside>

<!-- ── Main ────────────────────────────────────────────────────────────────── -->
<main class="main">
  <div class="top-bar">
    <h2 id="active-head-title">Select a head</h2>
    <div class="tab-bar">
      <div class="tab active" id="tab-gallery" onclick="showTab('gallery')">Gallery</div>
      <div class="tab" id="tab-demo" onclick="showTab('demo')">Demo</div>
    </div>
  </div>

  <div class="content">
    <!-- Gallery tab -->
    <div class="gallery-tab active" id="pane-gallery">
      <div class="viseme-grid" id="viseme-grid">
        <p style="color:#333;font-size:13px">Select or generate a head to see all viseme frames.</p>
      </div>
    </div>

    <!-- Demo tab -->
    <div class="demo-tab" id="pane-demo">
      <div class="stage-wrap">
        <div class="stage" id="stage">
          <svg id="blink-overlay" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
            <ellipse id="lid-l" cx="210" cy="240" rx="30" ry="0" fill="#F5C4A1" stroke="#3D2B1F" stroke-width="2"/>
            <ellipse id="lid-r" cx="302" cy="240" rx="30" ry="0" fill="#F5C4A1" stroke="#3D2B1F" stroke-width="2"/>
          </svg>
        </div>

        <div class="demo-controls">
          <div>
            <label>Sample sentences</label>
            <div class="sentence-list" id="sentence-list"><!-- filled by JS --></div>
            <div class="custom-row">
              <input type="text" id="custom-sentence" placeholder="Type your own sentence…"/>
              <button onclick="loadCustomSentence()">Speak</button>
            </div>
          </div>

          <div>
            <label>Playback</label>
            <div class="playback-row">
              <button class="play-btn" id="play-btn" onclick="playDemo()" disabled>▶ Play</button>
              <button class="spd-btn active" id="spd-1" onclick="setSpeed(1)">1×</button>
              <button class="spd-btn" onclick="setSpeed(0.5)">0.5×</button>
              <button class="spd-btn" onclick="setSpeed(0.25)">0.25×</button>
            </div>
            <div class="progress-bar-wrap" style="margin-top:10px"><div class="progress-bar" id="progress-bar"></div></div>
            <div class="speak-status" id="speak-status"></div>
          </div>

          <div>
            <label>Caption</label>
            <div class="caption-box" id="caption-box">—</div>
          </div>

          <div>
            <label>Visemes</label>
            <div class="chip-row" id="chip-row"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let activeHead = null;
let headSvgs = {};
let currentTimeline = null;
let currentAudioB64 = null;
let currentAudioDuration = 0;
let speed = 1;
let rafId = null;
let audioCtx = null;
let audioSource = null;
let startAudioTime = 0;
let startWallTime = 0;

const SAMPLE_SENTENCES = [
  "The quick brown fox jumps over the lazy dog.",
  "Watch carefully as the mouth moves between different positions.",
  "Shall we find a quiet beach or visit the old zoo?",
];

const VISEME_ORDER = ["sil","PP","FF","TH","DD","kk","CH","SS","nn","RR","aa","E","I","O","U"];

// ── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  await loadPresets();
  await loadHeads();
  buildSentenceList();
  startBlink();
}

async function loadPresets() {
  const res = await fetch('/api/presets');
  const presets = await res.json();
  const grid = document.getElementById('preset-grid');
  for (const p of presets) {
    const btn = document.createElement('button');
    btn.className = 'preset-btn';
    btn.dataset.key = p.key;
    btn.textContent = p.key.replace(/_/g,' ');
    btn.title = p.description;
    btn.onclick = () => selectPreset(p.key, p.description, btn);
    grid.appendChild(btn);
  }
}

function selectPreset(key, desc, btn) {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('custom-style').value = desc;
  document.getElementById('custom-name').value = key;
}

async function loadHeads() {
  const res = await fetch('/api/heads');
  const heads = await res.json();
  const list = document.getElementById('head-list');
  list.innerHTML = '';
  for (const h of heads) {
    const card = document.createElement('div');
    card.className = 'head-card';
    card.dataset.name = h.name;
    card.onclick = () => selectHead(h.name);
    const thumb = document.createElement('div');
    thumb.className = 'head-thumb';
    if (h.sil_svg) thumb.innerHTML = h.sil_svg;
    const info = document.createElement('div');
    info.innerHTML = `<div class="head-name">${h.name.replace(/_/g,' ')}</div>
                      <div class="head-meta">${h.visemes} visemes${h.complete ? ' ✓' : ''}</div>`;
    card.append(thumb, info);
    list.appendChild(card);
  }
  if (heads.length === 0) {
    list.innerHTML = '<p style="color:#333;font-size:12px;padding:4px">No heads yet — generate one above</p>';
  }
}

function buildSentenceList() {
  const list = document.getElementById('sentence-list');
  list.innerHTML = '';
  for (const [i, s] of SAMPLE_SENTENCES.entries()) {
    const btn = document.createElement('button');
    btn.className = 'sent-btn';
    btn.textContent = s;
    btn.onclick = () => loadSentence(s, btn);
    list.appendChild(btn);
  }
}

// ── Head selection ────────────────────────────────────────────────────────────
async function selectHead(name) {
  document.querySelectorAll('.head-card').forEach(c => c.classList.remove('active'));
  const card = document.querySelector(`.head-card[data-name="${name}"]`);
  if (card) card.classList.add('active');

  activeHead = name;
  document.getElementById('active-head-title').textContent = name.replace(/_/g,' ');

  // Load SVGs
  const res = await fetch(`/api/head/${name}/svgs`);
  headSvgs = await res.json();

  renderGallery();
  setupStage();
  buildChipRow();
  document.getElementById('play-btn').disabled = !currentTimeline;
}

function renderGallery() {
  const grid = document.getElementById('viseme-grid');
  grid.innerHTML = '';
  for (const v of VISEME_ORDER) {
    if (!headSvgs[v]) continue;
    const card = document.createElement('div');
    card.className = 'viseme-card';
    card.innerHTML = `${headSvgs[v]}<div class="viseme-label">${v}</div>`;
    grid.appendChild(card);
  }
}

function setupStage() {
  const stage = document.getElementById('stage');
  // Remove old SVG frames (keep blink overlay)
  stage.querySelectorAll('svg:not(#blink-overlay)').forEach(e => e.remove());

  for (const [v, svg] of Object.entries(headSvgs)) {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'width:100%;height:100%;position:absolute;top:0;left:0;display:none';
    wrap.dataset.viseme = v;
    wrap.id = `frame-${v}`;
    wrap.innerHTML = svg;
    const svgEl = wrap.querySelector('svg');
    if (svgEl) { svgEl.style.cssText = 'width:100%;height:100%;position:absolute;top:0;left:0'; }
    stage.insertBefore(wrap, document.getElementById('blink-overlay'));
  }

  showViseme('sil');
}

function showViseme(v) {
  document.querySelectorAll('#stage > div[data-viseme]').forEach(el => {
    el.style.display = el.dataset.viseme === v ? 'block' : 'none';
  });
}

function buildChipRow() {
  const row = document.getElementById('chip-row');
  row.innerHTML = '';
  for (const v of VISEME_ORDER) {
    if (!headSvgs[v]) continue;
    const chip = document.createElement('span');
    chip.className = 'vis-chip';
    chip.id = `chip-${v}`;
    chip.textContent = v;
    row.appendChild(chip);
  }
}

// ── Generation ────────────────────────────────────────────────────────────────
async function generateHead() {
  const style = document.getElementById('custom-style').value.trim();
  const name = document.getElementById('custom-name').value.trim() || undefined;
  if (!style) { setStatus('Enter a style description', 'err'); return; }

  const btn = document.getElementById('generate-btn');
  btn.disabled = true;
  setStatus('Generating… (this takes 1–3 minutes)', 'running');

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({style, name}),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Generation failed');
    setStatus(`Done! ${data.name} ready`, 'ok');
    await loadHeads();
    await selectHead(data.name);
    showTab('gallery');
  } catch(e) {
    setStatus(e.message, 'err');
  } finally {
    btn.disabled = false;
  }
}

function setStatus(msg, cls='') {
  const el = document.getElementById('gen-status');
  el.textContent = msg;
  el.className = 'status ' + cls;
}

// ── Demo ──────────────────────────────────────────────────────────────────────
let loadedSentence = null;

function loadSentence(text, btn) {
  document.querySelectorAll('.sent-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  loadedSentence = text;
  document.getElementById('caption-box').textContent = text;
  document.getElementById('play-btn').disabled = true;
  document.getElementById('speak-status').textContent = 'Fetching audio…';
  currentTimeline = null;
  currentAudioB64 = null;

  if (!activeHead) { document.getElementById('speak-status').textContent = 'Select a head first'; return; }

  fetch('/api/speak', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({text, head: activeHead}),
  }).then(r => r.json()).then(data => {
    if (data.detail) throw new Error(data.detail);
    currentTimeline = data.timeline;
    currentAudioB64 = data.audio_b64;
    document.getElementById('play-btn').disabled = false;
    document.getElementById('speak-status').textContent = `Ready (${data.timeline.length} phonemes)`;
  }).catch(e => {
    document.getElementById('speak-status').textContent = 'Error: ' + e.message;
  });
}

function loadCustomSentence() {
  const text = document.getElementById('custom-sentence').value.trim();
  if (!text) return;
  loadSentence(text, null);
}

function setSpeed(s) {
  speed = s;
  document.querySelectorAll('.spd-btn').forEach(b => b.classList.remove('active'));
  const map = {1:'spd-1', 0.5:'spd-05', 0.25:'spd-025'};
  // toggle active on whichever was clicked
  document.querySelectorAll('.spd-btn').forEach(b => {
    b.classList.toggle('active', parseFloat(b.textContent) === s);
  });
}

async function playDemo() {
  if (!currentTimeline || !currentAudioB64) return;
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }

  // Decode audio
  if (!audioCtx) audioCtx = new AudioContext();
  const raw = Uint8Array.from(atob(currentAudioB64), c => c.charCodeAt(0));
  const audioBuf = await audioCtx.decodeAudioData(raw.buffer);
  currentAudioDuration = audioBuf.duration;

  if (audioSource) { try { audioSource.stop(); } catch(e){} }
  audioSource = audioCtx.createBufferSource();
  audioSource.buffer = audioBuf;
  audioSource.playbackRate.value = speed;
  audioSource.connect(audioCtx.destination);
  audioSource.start();

  startAudioTime = 0;
  startWallTime = performance.now();

  function frame() {
    const elapsed = (performance.now() - startWallTime) / 1000 * speed;
    const frac = Math.min(elapsed / currentAudioDuration, 1);
    document.getElementById('progress-bar').style.width = (frac * 100) + '%';

    // Find current viseme
    let cur = 'sil';
    for (const ev of currentTimeline) {
      if (elapsed >= ev.t) cur = ev.v;
      else break;
    }
    showViseme(cur);
    document.querySelectorAll('.vis-chip').forEach(c => {
      c.classList.toggle('active', c.id === `chip-${cur}`);
    });

    if (frac < 1) {
      rafId = requestAnimationFrame(frame);
    } else {
      showViseme('sil');
      document.getElementById('progress-bar').style.width = '0%';
    }
  }
  rafId = requestAnimationFrame(frame);
}

// ── Tabs ─────────────────────────────────────────────────────────────────────
function showTab(name) {
  document.getElementById('pane-gallery').classList.toggle('active', name === 'gallery');
  document.getElementById('pane-demo').classList.toggle('active', name === 'demo');
  document.getElementById('tab-gallery').classList.toggle('active', name === 'gallery');
  document.getElementById('tab-demo').classList.toggle('active', name === 'demo');
}

// ── Blink ─────────────────────────────────────────────────────────────────────
const lidL = document.getElementById('lid-l');
const lidR = document.getElementById('lid-r');

function setLids(ry) {
  if (lidL) lidL.setAttribute('ry', ry);
  if (lidR) lidR.setAttribute('ry', ry);
}

const BLINK_STEPS = [0, 7, 14, 21, 28, 28, 21, 14, 7, 0];
const BLINK_STEP_MS = 20;

function runBlink(onDone) {
  BLINK_STEPS.forEach((ry, i) => setTimeout(() => setLids(ry), i * BLINK_STEP_MS));
  setTimeout(onDone, BLINK_STEPS.length * BLINK_STEP_MS);
}

function scheduleBlink() {
  const wait = 4000 + Math.random() * 5000;
  setTimeout(() => {
    runBlink(() => {
      if (Math.random() < 0.25) {
        setTimeout(() => runBlink(scheduleBlink), 250);
      } else {
        scheduleBlink();
      }
    });
  }, wait);
}

function startBlink() {
  setTimeout(scheduleBlink, 1500 + Math.random() * 2000);
}

// ── Boot ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
