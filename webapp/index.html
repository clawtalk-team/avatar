<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Voxhelm Studio</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d0d0d;color:#e0e0e0;font-family:system-ui,-apple-system,sans-serif;display:flex;min-height:100vh}

  /* ── Sidebar ── */
  .sidebar{width:300px;min-width:280px;background:#131313;border-right:1px solid #1e1e1e;display:flex;flex-direction:column;overflow-y:auto}
  .sidebar-header{padding:20px 20px 12px;border-bottom:1px solid #1e1e1e}
  .sidebar-header h1{font-size:16px;font-weight:700;color:#fff;letter-spacing:.4px}
  .sidebar-header p{font-size:11px;color:#444;margin-top:3px}
  .sidebar-section{padding:14px 20px;border-bottom:1px solid #1a1a1a}
  .sidebar-section label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#555;display:block;margin-bottom:6px}
  .head-list{display:flex;flex-direction:column;gap:5px;flex:1;padding:8px 12px}
  .head-card{background:#181818;border:1px solid #222;border-radius:8px;padding:8px 10px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:border-color .12s}
  .head-card:hover{border-color:#333}
  .head-card.active{border-color:#2a6;background:#0d1f14}
  .head-name{font-size:13px;font-weight:600;color:#ccc}
  .head-meta{font-size:11px;color:#444;margin-top:2px}
  .head-badge{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;text-transform:uppercase}
  .head-badge.svg{background:#1a2a1a;color:#4c9}
  .head-badge.photo{background:#1a1a2a;color:#7af}

  /* ── Main area ── */
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .stepper{display:flex;gap:0;padding:16px 24px;border-bottom:1px solid #1a1a1a;background:#111}
  .step{display:flex;align-items:center;gap:8px;padding:6px 14px;font-size:12px;color:#444;cursor:pointer;border-radius:6px;transition:all .12s}
  .step:hover{color:#888}
  .step.active{color:#fff;background:#1a1a1a}
  .step.done{color:#4c9}
  .step-num{width:22px;height:22px;border-radius:50%;border:1px solid #333;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
  .step.active .step-num{border-color:#2a6;color:#4c9}
  .step.done .step-num{border-color:#2a6;background:#2a6;color:#fff}
  .step-arrow{color:#333;margin:0 4px}
  .pane{flex:1;overflow-y:auto;padding:24px;display:none}
  .pane.active{display:flex;flex-direction:column;align-items:center}

  /* ── Step 1: Generate base ── */
  .gen-form{max-width:500px;width:100%;display:flex;flex-direction:column;gap:16px}
  .mode-toggle{display:flex;gap:0;border:1px solid #2a2a2a;border-radius:8px;overflow:hidden}
  .mode-opt{flex:1;padding:10px;text-align:center;font-size:13px;cursor:pointer;background:#1a1a1a;color:#888;transition:all .12s}
  .mode-opt.active{background:#0e2a1a;color:#4c9;border-color:#2a6}
  .preset-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
  .preset-btn{background:#1a1a1a;border:1px solid #252525;border-radius:6px;padding:7px 8px;font-size:11px;color:#888;cursor:pointer;text-align:center;transition:all .12s}
  .preset-btn:hover{background:#202020;border-color:#333;color:#bbb}
  .preset-btn.active{background:#0e2a1a;border-color:#2a6;color:#4c9}
  .field textarea,.field input[type=text]{width:100%;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;color:#ddd;font-size:13px;padding:8px 10px;resize:vertical;font-family:inherit;outline:none}
  .field textarea:focus,.field input:focus{border-color:#2a5}
  .field label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#555;display:block;margin-bottom:6px}
  .btn-primary{background:#1a4a2a;color:#4c9;border:1px solid #2a6;border-radius:7px;padding:10px 24px;font-size:14px;font-weight:600;cursor:pointer;transition:background .12s}
  .btn-primary:hover{background:#1e5430}
  .btn-primary:disabled{background:#1a1a1a;color:#444;border-color:#222;cursor:default}
  .btn-secondary{background:#1a1a1a;color:#888;border:1px solid #333;border-radius:7px;padding:9px 20px;font-size:13px;cursor:pointer}
  .btn-secondary:hover{background:#222;color:#bbb}
  .status{font-size:12px;color:#555;min-height:16px;text-align:center}
  .status.ok{color:#4c9} .status.err{color:#e44} .status.running{color:#a8a}
  .or-divider{text-align:center;color:#333;font-size:12px;padding:4px 0}

  /* ── Step 2: Review ── */
  .review-wrap{display:flex;flex-direction:column;align-items:center;gap:20px;max-width:500px}
  .review-frame{width:360px;height:360px;background:#1a1a1a;border-radius:16px;overflow:hidden;border:1px solid #2a2a2a;display:flex;align-items:center;justify-content:center}
  .review-frame svg{width:100%;height:100%}
  .review-frame img{width:100%;height:100%;object-fit:cover}
  .review-actions{display:flex;gap:12px}

  /* ── Step 3: Gallery ── */
  .viseme-grid{display:flex;flex-wrap:wrap;gap:16px;justify-content:center}
  .viseme-card{background:#161616;border:1px solid #222;border-radius:10px;padding:12px;text-align:center;width:140px}
  .viseme-card svg{width:116px;height:116px;display:block;margin:0 auto}
  .viseme-card img{width:116px;height:116px;display:block;margin:0 auto;border-radius:6px;object-fit:cover}
  .viseme-label{font-size:11px;color:#666;margin-top:6px;font-family:monospace}
  .viseme-missing{color:#f66;font-size:11px}

  /* ── Step 4: Speak demo ── */
  .demo-wrap{display:flex;flex-direction:column;align-items:center;gap:20px;max-width:600px;width:100%}
  .stage{width:280px;height:280px;background:#1a1a1a;border-radius:16px;overflow:hidden;position:relative;border:1px solid #2a2a2a;flex-shrink:0}
  .stage svg,.stage img{width:100%;height:100%;position:absolute;top:0;left:0;display:none;object-fit:cover}
  #blink-overlay{display:block;width:100%;height:100%;position:absolute;top:0;left:0;pointer-events:none;z-index:10}
  .sentence-list{display:flex;flex-direction:column;gap:5px;width:100%;max-width:480px}
  .sent-btn{background:#181818;border:1px solid #252525;border-radius:6px;padding:7px 10px;font-size:12px;color:#888;cursor:pointer;text-align:left;transition:all .12s}
  .sent-btn:hover{background:#1e1e1e;border-color:#333;color:#bbb}
  .sent-btn.active{background:#0e1e2a;border-color:#27a;color:#7cf}
  .custom-row{display:flex;gap:6px;width:100%;max-width:480px}
  .custom-row input{flex:1;background:#181818;border:1px solid #252525;border-radius:6px;padding:7px 10px;font-size:12px;color:#ccc;outline:none}
  .custom-row input:focus{border-color:#2a5}
  .custom-row button{background:#181818;border:1px solid #252525;border-radius:6px;padding:7px 14px;font-size:12px;color:#888;cursor:pointer}
  .playback-row{display:flex;gap:8px;align-items:center}
  .play-btn{background:#1a4a2a;color:#4c9;border:1px solid #2a6;border-radius:7px;padding:9px 22px;font-size:14px;font-weight:600;cursor:pointer}
  .play-btn:hover{background:#1e5430}
  .play-btn:disabled{background:#1a1a1a;color:#444;border-color:#222;cursor:default}
  .spd-btn{background:#181818;color:#666;border:1px solid #252525;padding:6px 11px;border-radius:6px;font-size:12px;cursor:pointer}
  .spd-btn.active{background:#1a2a3a;border-color:#27a;color:#7cf}
  .progress-bar-wrap{width:100%;max-width:480px;height:4px;background:#1e1e1e;border-radius:2px;overflow:hidden}
  .progress-bar{height:100%;background:#2a6;width:0%;transition:width .1s linear}
  .vis-label{font-size:24px;font-weight:700;color:#7cf;min-height:32px}
  .chip-row{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;max-width:440px}
  .vis-chip{padding:3px 9px;border-radius:10px;font-size:11px;font-family:monospace;background:#1a1a1a;border:1px solid #222;color:#555;transition:all .1s}
  .vis-chip.active{background:#0a1f0f;border-color:#2a6;color:#4c9}
</style>
</head>
<body>

<!-- ── Sidebar ──────────────────────────────────────────────────────────────── -->
<aside class="sidebar">
  <div class="sidebar-header">
    <h1>Voxhelm Studio</h1>
    <p>Avatar generation and lip-sync toolkit</p>
  </div>
  <div class="sidebar-section" style="border-bottom:none;flex:1">
    <label>Generated heads</label>
    <div class="head-list" id="head-list"></div>
  </div>
</aside>

<!-- ── Main ─────────────────────────────────────────────────────────────────── -->
<main class="main">
  <div class="stepper" id="stepper">
    <div class="step active" data-step="1" onclick="goToStep(1)">
      <span class="step-num">1</span> Generate Base
    </div>
    <span class="step-arrow">→</span>
    <div class="step" data-step="2" onclick="goToStep(2)">
      <span class="step-num">2</span> Review
    </div>
    <span class="step-arrow">→</span>
    <div class="step" data-step="3" onclick="goToStep(3)">
      <span class="step-num">3</span> Gallery
    </div>
    <span class="step-arrow">→</span>
    <div class="step" data-step="4" onclick="goToStep(4)">
      <span class="step-num">4</span> Speak Demo
    </div>
  </div>

  <!-- Step 1: Generate Base -->
  <div class="pane active" id="pane-1">
    <div class="gen-form">
      <h2 style="color:#fff;font-size:18px;text-align:center">Generate Base Frame</h2>
      <div class="field">
        <label>Mode</label>
        <div class="mode-toggle">
          <div class="mode-opt active" data-mode="svg" onclick="setMode('svg',this)">SVG Cartoon</div>
          <div class="mode-opt" data-mode="photo" onclick="setMode('photo',this)">Photorealistic</div>
        </div>
      </div>
      <div class="field">
        <label>Presets</label>
        <div class="preset-grid" id="preset-grid"></div>
      </div>
      <div class="or-divider">— or —</div>
      <div class="field">
        <label>Custom prompt</label>
        <textarea id="prompt-input" rows="3" placeholder="e.g. friendly robot with glowing teal eyes, flat design"></textarea>
      </div>
      <div class="field">
        <label>Name (optional)</label>
        <input type="text" id="name-input" placeholder="auto-generated from prompt"/>
      </div>
      <button class="btn-primary" id="gen-base-btn" onclick="doGenerateBase()">Generate Base</button>
      <div class="status" id="gen-status"></div>
    </div>
  </div>

  <!-- Step 2: Review Base -->
  <div class="pane" id="pane-2">
    <div class="review-wrap">
      <h2 style="color:#fff;font-size:18px">Review Base Frame</h2>
      <p style="color:#666;font-size:13px">Check the character looks right before generating all 15 visemes.</p>
      <div class="review-frame" id="review-frame"></div>
      <div class="review-actions">
        <button class="btn-secondary" onclick="goToStep(1)">← Regenerate</button>
        <button class="btn-primary" id="approve-btn" onclick="doGenerateVisemes()">Approve & Generate Visemes</button>
      </div>
      <div class="status" id="viseme-status"></div>
    </div>
  </div>

  <!-- Step 3: Gallery -->
  <div class="pane" id="pane-3">
    <h2 style="color:#fff;font-size:18px;margin-bottom:16px" id="gallery-title">Viseme Gallery</h2>
    <div class="viseme-grid" id="viseme-grid"></div>
    <div style="margin-top:20px">
      <button class="btn-primary" onclick="goToStep(4)">Try Speak Demo →</button>
    </div>
  </div>

  <!-- Step 4: Speak Demo -->
  <div class="pane" id="pane-4">
    <div class="demo-wrap">
      <div class="stage" id="stage">
        <svg id="blink-overlay" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
          <ellipse id="lid-l" cx="210" cy="240" rx="30" ry="0" fill="#F5C4A1" stroke="#3D2B1F" stroke-width="2"/>
          <ellipse id="lid-r" cx="302" cy="240" rx="30" ry="0" fill="#F5C4A1" stroke="#3D2B1F" stroke-width="2"/>
        </svg>
      </div>
      <div class="vis-label" id="vis-label">sil</div>
      <div class="sentence-list" id="sentence-list"></div>
      <div class="custom-row">
        <input type="text" id="custom-sentence" placeholder="Type your own sentence…"/>
        <button onclick="loadCustomSentence()">Speak</button>
      </div>
      <div class="playback-row">
        <button class="play-btn" id="play-btn" onclick="playDemo()" disabled>▶ Play</button>
        <button class="spd-btn active" onclick="setSpeed(1,this)">1×</button>
        <button class="spd-btn" onclick="setSpeed(0.5,this)">0.5×</button>
        <button class="spd-btn" onclick="setSpeed(0.25,this)">0.25×</button>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
      <div class="status" id="speak-status"></div>
      <div class="chip-row" id="chip-row"></div>
    </div>
  </div>
</main>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let currentStep = 1;
let currentMode = 'svg';
let currentHead = null;
let headAssets = {};   // {viseme: {type:'svg'|'png', data:'...'}, ...}
let headMode = 'svg';
let currentTimeline = null;
let currentAudioB64 = null;
let speed = 1;
let rafId = null;
let audioCtx = null;
let audioSource = null;
let startWallTime = 0;
let currentAudioDuration = 0;

const VISEME_ORDER = ['sil','PP','FF','TH','DD','kk','CH','SS','nn','RR','aa','E','I','O','U'];
const SAMPLES = [
  'The quick brown fox jumps over the lazy dog.',
  'Watch carefully as the mouth moves between different positions.',
  'Shall we find a quiet beach or visit the old zoo?',
];

// ── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  await loadPresets();
  await loadHeads();
  buildSentenceList();
  startBlink();
}

async function loadPresets() {
  const res = await fetch('/api/presets');
  const presets = await res.json();
  const grid = document.getElementById('preset-grid');
  grid.innerHTML = '';
  for (const p of presets) {
    const btn = document.createElement('button');
    btn.className = 'preset-btn';
    btn.textContent = p.key.replace(/_/g, ' ');
    btn.title = p.description;
    btn.onclick = () => {
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('prompt-input').value = p.description;
      document.getElementById('name-input').value = p.key;
    };
    grid.appendChild(btn);
  }
}

async function loadHeads() {
  const res = await fetch('/api/heads');
  const heads = await res.json();
  const list = document.getElementById('head-list');
  list.innerHTML = '';
  if (heads.length === 0) {
    list.innerHTML = '<p style="color:#333;font-size:12px;padding:4px">No heads yet</p>';
    return;
  }
  for (const h of heads) {
    const card = document.createElement('div');
    card.className = 'head-card' + (currentHead === h.name ? ' active' : '');
    card.onclick = () => selectHead(h.name);
    card.innerHTML = `
      <div>
        <div class="head-name">${h.name.replace(/_/g, ' ')}</div>
        <div class="head-meta">${h.visemes} visemes ${h.complete ? '✓' : ''}</div>
      </div>
      <span class="head-badge ${h.mode}">${h.mode}</span>`;
    list.appendChild(card);
  }
}

// ── Step navigation ──────────────────────────────────────────────────────────
function goToStep(n) {
  currentStep = n;
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  document.getElementById(`pane-${n}`).classList.add('active');
  document.querySelectorAll('.step').forEach(s => {
    const sn = parseInt(s.dataset.step);
    s.classList.toggle('active', sn === n);
    s.classList.toggle('done', sn < n);
  });
}

// ── Mode toggle ──────────────────────────────────────────────────────────────
function setMode(mode, el) {
  currentMode = mode;
  document.querySelectorAll('.mode-opt').forEach(o => o.classList.remove('active'));
  el.classList.add('active');
}

// ── Step 1: Generate base ────────────────────────────────────────────────────
async function doGenerateBase() {
  const prompt = document.getElementById('prompt-input').value.trim();
  const name = document.getElementById('name-input').value.trim() || undefined;
  const presetBtn = document.querySelector('.preset-btn.active');
  const preset = presetBtn ? document.getElementById('name-input').value.trim() : undefined;

  if (!prompt && !preset) { setStatus('gen-status', 'Enter a prompt or select a preset', 'err'); return; }

  const btn = document.getElementById('gen-base-btn');
  btn.disabled = true;
  setStatus('gen-status', 'Generating base frame…', 'running');

  try {
    const body = { mode: currentMode };
    if (prompt) body.prompt = prompt;
    if (preset) body.preset = preset;
    if (name) body.name = name;

    const res = await fetch('/api/generate-base', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Generation failed');

    currentHead = data.name;
    setStatus('gen-status', `Base generated: ${data.name}`, 'ok');
    await loadHeads();
    await loadHeadAssets(data.name);
    showReview();
    goToStep(2);
  } catch(e) {
    setStatus('gen-status', e.message, 'err');
  } finally {
    btn.disabled = false;
  }
}

// ── Step 2: Review ───────────────────────────────────────────────────────────
function showReview() {
  const frame = document.getElementById('review-frame');
  frame.innerHTML = '';
  const sil = headAssets['sil'];
  if (!sil) { frame.innerHTML = '<p style="color:#666">No base frame found</p>'; return; }
  if (sil.type === 'svg') {
    frame.innerHTML = sil.data;
  } else {
    const img = document.createElement('img');
    img.src = sil.data;
    frame.appendChild(img);
  }
}

async function doGenerateVisemes() {
  const btn = document.getElementById('approve-btn');
  btn.disabled = true;
  setStatus('viseme-status', 'Generating 14 visemes… (this takes 1–3 minutes)', 'running');

  try {
    const res = await fetch('/api/generate-visemes', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ head: currentHead }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Generation failed');

    setStatus('viseme-status', 'Done!', 'ok');
    await loadHeads();
    await loadHeadAssets(currentHead);
    renderGallery();
    setupStage();
    goToStep(3);
  } catch(e) {
    setStatus('viseme-status', e.message, 'err');
  } finally {
    btn.disabled = false;
  }
}

// ── Head selection (from sidebar) ────────────────────────────────────────────
async function selectHead(name) {
  currentHead = name;
  document.querySelectorAll('.head-card').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.head-card').forEach(c => {
    if (c.querySelector('.head-name')?.textContent === name.replace(/_/g, ' '))
      c.classList.add('active');
  });
  await loadHeadAssets(name);
  renderGallery();
  setupStage();
  goToStep(3);
}

async function loadHeadAssets(name) {
  const res = await fetch(`/api/head/${name}/assets`);
  const data = await res.json();
  headAssets = data.assets || {};
  headMode = data.mode || 'svg';
  document.getElementById('gallery-title').textContent = `${name.replace(/_/g, ' ')} — ${Object.keys(headAssets).length}/15 visemes`;
}

// ── Step 3: Gallery ──────────────────────────────────────────────────────────
function renderGallery() {
  const grid = document.getElementById('viseme-grid');
  grid.innerHTML = '';
  for (const v of VISEME_ORDER) {
    const card = document.createElement('div');
    card.className = 'viseme-card';
    const asset = headAssets[v];
    if (!asset) {
      card.innerHTML = `<div class="viseme-missing">missing</div><div class="viseme-label">${v}</div>`;
    } else if (asset.type === 'svg') {
      card.innerHTML = `${asset.data}<div class="viseme-label">${v}</div>`;
    } else {
      card.innerHTML = `<img src="${asset.data}" alt="${v}"/><div class="viseme-label">${v}</div>`;
    }
    grid.appendChild(card);
  }
}

// ── Step 4: Stage + speak ────────────────────────────────────────────────────
function setupStage() {
  const stage = document.getElementById('stage');
  // Remove old frames (keep blink overlay)
  stage.querySelectorAll('[data-viseme]').forEach(e => e.remove());

  for (const [v, asset] of Object.entries(headAssets)) {
    if (asset.type === 'svg') {
      const wrap = document.createElement('div');
      wrap.style.cssText = 'width:100%;height:100%;position:absolute;top:0;left:0;display:none';
      wrap.dataset.viseme = v;
      wrap.innerHTML = asset.data;
      const svgEl = wrap.querySelector('svg');
      if (svgEl) svgEl.style.cssText = 'width:100%;height:100%';
      stage.insertBefore(wrap, document.getElementById('blink-overlay'));
    } else {
      const img = document.createElement('img');
      img.src = asset.data;
      img.dataset.viseme = v;
      img.style.display = 'none';
      stage.insertBefore(img, document.getElementById('blink-overlay'));
    }
  }
  showViseme('sil');
  buildChipRow();
}

function showViseme(v) {
  if (!headAssets[v]) v = 'sil';
  document.querySelectorAll('#stage [data-viseme]').forEach(el => {
    el.style.display = el.dataset.viseme === v ? 'block' : 'none';
  });
  document.getElementById('vis-label').textContent = v;
  document.querySelectorAll('.vis-chip').forEach(c => {
    c.classList.toggle('active', c.textContent === v);
  });
}

function buildChipRow() {
  const row = document.getElementById('chip-row');
  row.innerHTML = '';
  for (const v of VISEME_ORDER) {
    if (!headAssets[v]) continue;
    const chip = document.createElement('span');
    chip.className = 'vis-chip';
    chip.textContent = v;
    row.appendChild(chip);
  }
}

function buildSentenceList() {
  const list = document.getElementById('sentence-list');
  list.innerHTML = '';
  for (const s of SAMPLES) {
    const btn = document.createElement('button');
    btn.className = 'sent-btn';
    btn.textContent = s;
    btn.onclick = () => loadSentence(s, btn);
    list.appendChild(btn);
  }
}

function loadCustomSentence() {
  const text = document.getElementById('custom-sentence').value.trim();
  if (text) loadSentence(text, null);
}

async function loadSentence(text, btn) {
  document.querySelectorAll('.sent-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  if (!currentHead) { setStatus('speak-status', 'Generate a head first', 'err'); return; }

  document.getElementById('play-btn').disabled = true;
  setStatus('speak-status', 'Fetching audio…', 'running');
  currentTimeline = null;
  currentAudioB64 = null;

  try {
    const res = await fetch('/api/speak', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ head: currentHead, text }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Speak failed');

    currentTimeline = data.timeline;
    currentAudioB64 = data.audio_b64;
    document.getElementById('play-btn').disabled = false;
    setStatus('speak-status', `Ready (${data.timeline.length} events)`, 'ok');
  } catch(e) {
    setStatus('speak-status', e.message, 'err');
  }
}

function setSpeed(s, el) {
  speed = s;
  document.querySelectorAll('.spd-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
}

async function playDemo() {
  if (!currentTimeline || !currentAudioB64) return;
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }

  if (!audioCtx) audioCtx = new AudioContext();
  const raw = Uint8Array.from(atob(currentAudioB64), c => c.charCodeAt(0));
  const audioBuf = await audioCtx.decodeAudioData(raw.buffer.slice(0));
  currentAudioDuration = audioBuf.duration;

  if (audioSource) { try { audioSource.stop(); } catch(e){} }
  audioSource = audioCtx.createBufferSource();
  audioSource.buffer = audioBuf;
  audioSource.playbackRate.value = speed;
  audioSource.connect(audioCtx.destination);
  audioSource.start();
  startWallTime = performance.now();

  function frame() {
    const elapsed = (performance.now() - startWallTime) / 1000 * speed;
    const frac = Math.min(elapsed / currentAudioDuration, 1);
    document.getElementById('progress-bar').style.width = (frac * 100) + '%';

    let cur = 'sil';
    for (const ev of currentTimeline) {
      if (elapsed >= ev.t) cur = ev.v; else break;
    }
    showViseme(cur);

    if (frac < 1) {
      rafId = requestAnimationFrame(frame);
    } else {
      showViseme('sil');
      document.getElementById('progress-bar').style.width = '0%';
    }
  }
  rafId = requestAnimationFrame(frame);
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function setStatus(id, msg, cls='') {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'status ' + cls;
}

// ── Blink ────────────────────────────────────────────────────────────────────
const lidL = document.getElementById('lid-l');
const lidR = document.getElementById('lid-r');
function setLids(ry) { if(lidL) lidL.setAttribute('ry',ry); if(lidR) lidR.setAttribute('ry',ry); }
const BLINK = [0,7,14,21,28,28,21,14,7,0];
function runBlink(cb) { BLINK.forEach((ry,i) => setTimeout(() => setLids(ry), i*20)); setTimeout(cb, BLINK.length*20); }
function scheduleBlink() {
  setTimeout(() => { runBlink(() => {
    if (Math.random()<0.25) setTimeout(() => runBlink(scheduleBlink), 250);
    else scheduleBlink();
  }); }, 4000+Math.random()*5000);
}
function startBlink() { setTimeout(scheduleBlink, 1500+Math.random()*2000); }

// ── Boot ─────────────────────────────────────────────────────────────────────
init();
</script>
