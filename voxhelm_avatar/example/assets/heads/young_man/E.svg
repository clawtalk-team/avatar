<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" fill="#FFF5E6" rx="20"/>
  
  <!-- Neck -->
  <rect x="220" y="360" width="72" height="60" fill="#F5C5A3" rx="5"/>
  
  <!-- Shoulders -->
  <path d="M120 440 Q150 390 220 400 L292 400 Q362 390 392 440 L400 512 L112 512 Z" fill="#5B8EC2" rx="10"/>
  
  <!-- Shirt collar -->
  <path d="M220 400 L240 430 L256 415 L272 430 L292 400" fill="#4A7DB1" stroke="none"/>
  
  <!-- Ears -->
  <!-- Left ear -->
  <ellipse cx="128" cy="260" rx="22" ry="32" fill="#F5C5A3"/>
  <ellipse cx="132" cy="260" rx="12" ry="20" fill="#E8A882"/>
  
  <!-- Right ear -->
  <ellipse cx="384" cy="260" rx="22" ry="32" fill="#F5C5A3"/>
  <ellipse cx="380" cy="260" rx="12" ry="20" fill="#E8A882"/>
  
  <!-- Head/Face -->
  <ellipse cx="256" cy="250" rx="130" ry="150" fill="#FACDA0"/>
  
  <!-- Hair base (dark brown/black) -->
  <path d="M126 220 Q126 100 256 90 Q386 100 386 220 L386 180 Q386 95 256 80 Q126 95 126 180 Z" fill="#3A2A1A"/>
  
  <!-- Hair top volume -->
  <path d="M120 200 Q120 85 256 72 Q392 85 392 200 Q390 150 360 120 Q320 90 256 82 Q192 90 152 120 Q125 150 120 200 Z" fill="#4A3828"/>
  
  <!-- Hair side left -->
  <path d="M126 180 Q126 130 160 110 Q140 140 135 180 Q132 200 130 220 L126 220 Z" fill="#3A2A1A"/>
  
  <!-- Hair side right -->
  <path d="M386 180 Q386 130 352 110 Q372 140 377 180 Q380 200 382 220 L386 220 Z" fill="#3A2A1A"/>
  
  <!-- Hair front fringe -->
  <path d="M150 170 Q160 120 210 105 Q240 95 256 95 Q272 95 302 105 Q352 120 362 170 Q350 135 310 118 Q270 105 256 105 Q242 105 202 118 Q162 135 150 170 Z" fill="#2E1F10"/>
  
  <!-- Eyebrows -->
  <!-- Left eyebrow -->
  <path d="M175 195 Q195 182 225 188" stroke="#3A2A1A" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Right eyebrow -->
  <path d="M287 188 Q317 182 337 195" stroke="#3A2A1A" stroke-width="5" fill="none" stroke-linecap="round"/>
  
  <!-- Eyes -->
  <!-- Left eye white -->
  <ellipse cx="200" cy="235" rx="30" ry="24" fill="white"/>
  <!-- Left iris -->
  <ellipse cx="203" cy="237" rx="16" ry="18" fill="#5A8E4A"/>
  <!-- Left pupil -->
  <ellipse cx="205" cy="238" rx="8" ry="9" fill="#1A1A1A"/>
  <!-- Left eye highlight -->
  <ellipse cx="210" cy="230" rx="5" ry="4" fill="white" opacity="0.9"/>
  <!-- Left eye outline -->
  <ellipse cx="200" cy="235" rx="30" ry="24" fill="none" stroke="#2E1F10" stroke-width="2.5"/>
  <!-- Left eyelid line -->
  <path d="M170 230 Q200 215 230 230" stroke="#2E1F10" stroke-width="2" fill="none"/>
  
  <!-- Right eye white -->
  <ellipse cx="312" cy="235" rx="30" ry="24" fill="white"/>
  <!-- Right iris -->
  <ellipse cx="309" cy="237" rx="16" ry="18" fill="#5A8E4A"/>
  <!-- Right pupil -->
  <ellipse cx="307" cy="238" rx="8" ry="9" fill="#1A1A1A"/>
  <!-- Right eye highlight -->
  <ellipse cx="314" cy="230" rx="5" ry="4" fill="white" opacity="0.9"/>
  <!-- Right eye outline -->
  <ellipse cx="312" cy="235" rx="30" ry="24" fill="none" stroke="#2E1F10" stroke-width="2.5"/>
  <!-- Right eyelid line -->
  <path d="M282 230 Q312 215 342 230" stroke="#2E1F10" stroke-width="2" fill="none"/>
  
  <!-- Nose -->
  <path d="M250 280 Q256 295 262 280" stroke="#D4956A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="247" cy="282" r="3" fill="#D4956A" opacity="0.5"/>
  <circle cx="265" cy="282" r="3" fill="#D4956A" opacity="0.5"/>
  
  <!-- Mouth - Viseme "E": half-open, wide spread lips -->
  <!-- Outer mouth shape (lips) -->
  <path d="M210 330 Q220 322 235 320 Q248 318 256 318 Q264 318 277 320 Q292 322 302 330 Q295 350 280 356 Q268 360 256 361 Q244 360 232 356 Q217 350 210 330 Z" fill="#C45A5A"/>
  
  <!-- Upper lip highlight -->
  <path d="M215 330 Q225 324 240 322 Q250 320 256 320 Q262 320 272 322 Q287 324 297 330 Q290 327 275 324 Q265 322 256 322 Q247 322 237 324 Q222 327 215 330 Z" fill="#D46A6A"/>
  
  <!-- Mouth interior (dark) -->
  <path d="M218 332 Q228 326 242 324 Q250 323 256 323 Q262 323 270 324 Q284 326 294 332 Q288 346 276 351 Q266 354 256 355 Q246 354 236 351 Q224 346 218 332 Z" fill="#3A1515"/>
  
  <!-- Teeth (upper row) -->
  <path d="M225 332 Q235 327 245 325 Q252 324 256 324 Q260 324 267 325 Q277 327 287 332 L287 340 Q277 336 267 334 Q260 333 256 333 Q252 333 245 334 Q235 336 225 340 Z" fill="#F5F0EB"/>
  
  <!-- Teeth divider lines -->
  <line x1="245" y1="325" x2="245" y2="336" stroke="#E0D8D0" stroke-width="0.7" opacity="0.5"/>
  <line x1="256" y1="324" x2="256" y2="335" stroke="#E0D8D0" stroke-width="0.7" opacity="0.5"/>
  <line x1="267" y1="325" x2="267" y2="336" stroke="#E0D8D0" stroke-width="0.7" opacity="0.5"/>
  
  <!-- Tongue hint -->
  <ellipse cx="256" cy="350" rx="16" ry="8" fill="#C45050" opacity="0.7"/>
  
  <!-- Mouth outline -->
  <path d="M210 330 Q220 322 235 320 Q248 318 256 318 Q264 318 277 320 Q292 322 302 330 Q295 350 280 356 Q268 360 256 361 Q244 360 232 356 Q217 350 210 330 Z" fill="none" stroke="#2E1F10" stroke-width="2.5"/>
  
  <!-- Cheek blush left -->
  <ellipse cx="165" cy="300" rx="22" ry="14" fill="#F0A0A0" opacity="0.3"/>
  <!-- Cheek blush right -->
  <ellipse cx="347" cy="300" rx="22" ry="14" fill="#F0A0A0" opacity="0.3"/>
</svg>