<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" fill="#E8F0FE" rx="20"/>
  
  <!-- Neck -->
  <rect x="218" y="360" width="76" height="60" rx="8" fill="#8B6B4E"/>
  
  <!-- Shoulders -->
  <path d="M120 440 Q140 390 256 400 Q372 390 392 440 L400 512 L112 512 Z" fill="#3A5BA0"/>
  
  <!-- Collar -->
  <path d="M200 400 Q256 430 312 400 Q290 420 256 415 Q222 420 200 400Z" fill="#2E4A80"/>
  
  <!-- Ears -->
  <ellipse cx="112" cy="250" rx="28" ry="35" fill="#8B6B4E"/>
  <ellipse cx="112" cy="250" rx="16" ry="22" fill="#7A5C40"/>
  <ellipse cx="400" cy="250" rx="28" ry="35" fill="#8B6B4E"/>
  <ellipse cx="400" cy="250" rx="16" ry="22" fill="#7A5C40"/>
  
  <!-- Head shape -->
  <ellipse cx="256" cy="235" rx="140" ry="165" fill="#9B7B5E"/>
  
  <!-- Hair - slightly receding, salt and pepper -->
  <path d="M116 210 Q120 100 200 65 Q256 45 312 65 Q392 100 396 210 Q380 160 340 130 Q300 108 256 105 Q212 108 172 130 Q132 160 116 210Z" fill="#3D3530"/>
  <!-- Gray streaks in hair -->
  <path d="M160 170 Q180 130 220 115 Q200 140 185 170Z" fill="#8A8480" opacity="0.6"/>
  <path d="M340 155 Q330 125 300 110 Q320 130 330 155Z" fill="#8A8480" opacity="0.6"/>
  <path d="M256 105 Q270 100 285 108 Q270 112 256 110Z" fill="#8A8480" opacity="0.5"/>
  
  <!-- Slight temple graying -->
  <path d="M125 200 Q130 170 150 150 Q135 175 130 200Z" fill="#9A9590" opacity="0.5"/>
  <path d="M387 200 Q382 170 362 150 Q377 175 382 200Z" fill="#9A9590" opacity="0.5"/>
  
  <!-- Eyebrows -->
  <path d="M170 185 Q195 170 230 178" stroke="#3D3530" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M282 178 Q317 170 342 185" stroke="#3D3530" stroke-width="5" fill="none" stroke-linecap="round"/>
  
  <!-- Eye whites -->
  <ellipse cx="200" cy="225" rx="32" ry="24" fill="white"/>
  <ellipse cx="312" cy="225" rx="32" ry="24" fill="white"/>
  
  <!-- Irises -->
  <ellipse cx="204" cy="227" rx="16" ry="18" fill="#4A3520"/>
  <ellipse cx="316" cy="227" rx="16" ry="18" fill="#4A3520"/>
  
  <!-- Pupils -->
  <circle cx="206" cy="225" r="7" fill="#1A1008"/>
  <circle cx="318" cy="225" r="7" fill="#1A1008"/>
  
  <!-- Eye highlights -->
  <circle cx="210" cy="220" r="4" fill="white" opacity="0.9"/>
  <circle cx="322" cy="220" r="4" fill="white" opacity="0.9"/>
  <circle cx="200" cy="230" r="2" fill="white" opacity="0.5"/>
  <circle cx="312" cy="230" r="2" fill="white" opacity="0.5"/>
  
  <!-- Upper eyelids - slight crease -->
  <path d="M168 218 Q200 205 232 218" stroke="#7A5C40" stroke-width="2" fill="none"/>
  <path d="M280 218 Q312 205 344 218" stroke="#7A5C40" stroke-width="2" fill="none"/>
  
  <!-- Nose -->
  <path d="M256 240 Q248 275 238 290 Q248 298 256 300 Q264 298 274 290 Q264 275 256 240" fill="#876550" opacity="0.7"/>
  <circle cx="242" cy="292" r="5" fill="#876550" opacity="0.4"/>
  <circle cx="270" cy="292" r="5" fill="#876550" opacity="0.4"/>
  
  <!-- Smile lines / nasolabial folds -->
  <path d="M218 295 Q212 318 215 340" stroke="#876550" stroke-width="2" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M294 295 Q300 318 297 340" stroke="#876550" stroke-width="2" fill="none" opacity="0.4" stroke-linecap="round"/>
  
  <!-- Stubble area -->
  <ellipse cx="256" cy="355" rx="70" ry="40" fill="#6B5540" opacity="0.15"/>
  <rect x="215" y="328" width="82" height="30" rx="10" fill="#6B5540" opacity="0.1"/>
  <!-- Stubble dots - salt and pepper -->
  <circle cx="220" cy="340" r="1.2" fill="#3D3530" opacity="0.4"/>
  <circle cx="230" cy="345" r="1" fill="#8A8480" opacity="0.5"/>
  <circle cx="240" cy="338" r="1.2" fill="#3D3530" opacity="0.4"/>
  <circle cx="250" cy="348" r="1" fill="#8A8480" opacity="0.5"/>
  <circle cx="260" cy="340" r="1.2" fill="#3D3530" opacity="0.4"/>
  <circle cx="270" cy="346" r="1" fill="#3D3530" opacity="0.4"/>
  <circle cx="280" cy="338" r="1.2" fill="#8A8480" opacity="0.5"/>
  <circle cx="290" cy="344" r="1" fill="#3D3530" opacity="0.4"/>
  <circle cx="225" cy="352" r="1" fill="#3D3530" opacity="0.35"/>
  <circle cx="235" cy="356" r="1.2" fill="#8A8480" opacity="0.45"/>
  <circle cx="245" cy="360" r="1" fill="#3D3530" opacity="0.35"/>
  <circle cx="258" cy="358" r="1.2" fill="#3D3530" opacity="0.4"/>
  <circle cx="268" cy="355" r="1" fill="#8A8480" opacity="0.45"/>
  <circle cx="278" cy="360" r="1.2" fill="#3D3530" opacity="0.35"/>
  <circle cx="288" cy="352" r="1" fill="#8A8480" opacity="0.4"/>
  <circle cx="233" cy="365" r="1" fill="#3D3530" opacity="0.3"/>
  <circle cx="248" cy="368" r="1.2" fill="#8A8480" opacity="0.35"/>
  <circle cx="264" cy="367" r="1" fill="#3D3530" opacity="0.3"/>
  <circle cx="278" cy="365" r="1.2" fill="#8A8480" opacity="0.35"/>
  
  <!-- TH Mouth - lips slightly parted with tongue tip visible between teeth -->
  <!-- Outer mouth opening / lip shape -->
  <path d="M222 332 Q232 326 256 325 Q280 326 290 332 Q282 348 256 350 Q230 348 222 332Z" fill="#5C2020"/>
  
  <!-- Upper teeth row -->
  <path d="M228 332 Q240 328 256 327 Q272 328 284 332 L284 338 Q272 335 256 334 Q240 335 228 338Z" fill="#F0EDE8"/>
  
  <!-- Tooth separations on upper teeth -->
  <line x1="244" y1="329" x2="244" y2="337" stroke="#D8D4CE" stroke-width="0.8"/>
  <line x1="256" y1="328" x2="256" y2="335" stroke="#D8D4CE" stroke-width="0.8"/>
  <line x1="268" y1="329" x2="268" y2="337" stroke="#D8D4CE" stroke-width="0.8"/>
  
  <!-- Lower teeth row -->
  <path d="M232 344 Q244 347 256 348 Q268 347 280 344 L280 340 Q268 342 256 343 Q244 342 232 340Z" fill="#E8E4DE"/>
  
  <!-- Tooth separations on lower teeth -->
  <line x1="244" y1="341" x2="244" y2="347" stroke="#D0CCC6" stroke-width="0.7"/>
  <line x1="256" y1="342" x2="256" y2="348" stroke="#D0CCC6" stroke-width="0.7"/>
  <line x1="268" y1="341" x2="268" y2="347" stroke="#D0CCC6" stroke-width="0.7"/>
  
  <!-- Tongue tip visible between teeth -->
  <ellipse cx="256" cy="339" rx="14" ry="5" fill="#D4686A"/>
  <!-- Tongue highlight -->
  <ellipse cx="256" cy="338" rx="8" ry="3" fill="#E07880" opacity="0.6"/>
  
  <!-- Upper lip -->
  <path d="M218 332 Q230 324 244 322 Q256 318 268 322 Q282 324 294 332 Q282 328 268 326 Q256 323 244 326 Q230 328 218 332Z" fill="#8A6050"/>
  
  <!-- Lower lip -->
  <path d="M222 348 Q238 356 256 358 Q274 356 290 348 Q276 354 256 355 Q236 354 222 348Z" fill="#8A6050"/>
  
  <!-- Crow's feet / smile lines near eyes -->
  <path d="M165 232 Q158 228 154 222" stroke="#876550" stroke-width="1.5" fill="none" opacity="0.3" stroke-linecap="round"/>
  <path d="M347 232 Q354 228 358 222" stroke="#876550" stroke-width="1.5" fill="none" opacity="0.3" stroke-linecap="round"/>
</svg>