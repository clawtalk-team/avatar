<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" fill="#E8F0FE" rx="20"/>
  
  <!-- Neck -->
  <rect x="218" y="360" width="76" height="60" rx="8" fill="#8B6B4E"/>
  
  <!-- Shoulders -->
  <path d="M120 440 Q140 390 256 400 Q372 390 392 440 L400 512 L112 512 Z" fill="#3A5BA0"/>
  
  <!-- Collar -->
  <path d="M200 400 Q256 430 312 400 Q290 420 256 415 Q222 420 200 400Z" fill="#2E4A80"/>
  
  <!-- Ears -->
  <ellipse cx="112" cy="250" rx="28" ry="35" fill="#8B6B4E"/>
  <ellipse cx="112" cy="250" rx="16" ry="22" fill="#7A5C40"/>
  <ellipse cx="400" cy="250" rx="28" ry="35" fill="#8B6B4E"/>
  <ellipse cx="400" cy="250" rx="16" ry="22" fill="#7A5C40"/>
  
  <!-- Head shape -->
  <ellipse cx="256" cy="235" rx="140" ry="165" fill="#9B7B5E"/>
  
  <!-- Hair - slightly receding, salt and pepper -->
  <path d="M116 210 Q120 100 200 65 Q256 45 312 65 Q392 100 396 210 Q380 160 340 130 Q300 108 256 105 Q212 108 172 130 Q132 160 116 210Z" fill="#3D3530"/>
  <!-- Gray streaks in hair -->
  <path d="M160 170 Q180 130 220 115 Q200 140 185 170Z" fill="#8A8480" opacity="0.6"/>
  <path d="M340 155 Q330 125 300 110 Q320 130 330 155Z" fill="#8A8480" opacity="0.6"/>
  <path d="M256 105 Q270 100 285 108 Q270 112 256 110Z" fill="#8A8480" opacity="0.5"/>
  
  <!-- Slight temple graying -->
  <path d="M125 200 Q130 170 150 150 Q135 175 130 200Z" fill="#9A9590" opacity="0.5"/>
  <path d="M387 200 Q382 170 362 150 Q377 175 382 200Z" fill="#9A9590" opacity="0.5"/>
  
  <!-- Eyebrows -->
  <path d="M170 185 Q195 170 230 178" stroke="#3D3530" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M282 178 Q317 170 342 185" stroke="#3D3530" stroke-width="5" fill="none" stroke-linecap="round"/>
  
  <!-- Eye whites -->
  <ellipse cx="200" cy="225" rx="32" ry="24" fill="white"/>
  <ellipse cx="312" cy="225" rx="32" ry="24" fill="white"/>
  
  <!-- Irises -->
  <ellipse cx="204" cy="227" rx="16" ry="18" fill="#4A3520"/>
  <ellipse cx="316" cy="227" rx="16" ry="18" fill="#4A3520"/>
  
  <!-- Pupils -->
  <circle cx="206" cy="225" r="7" fill="#1A1008"/>
  <circle cx="318" cy="225" r="7" fill="#1A1008"/>
  
  <!-- Eye highlights -->
  <circle cx="210" cy="220" r="4" fill="white" opacity="0.9"/>
  <circle cx="322" cy="220" r="4" fill="white" opacity="0.9"/>
  <circle cx="200" cy="230" r="2" fill="white" opacity="0.5"/>
  <circle cx="312" cy="230" r="2" fill="white" opacity="0.5"/>
  
  <!-- Upper eyelids - slight crease -->
  <path d="M168 218 Q200 205 232 218" stroke="#7A5C40" stroke-width="2" fill="none"/>
  <path d="M280 218 Q312 205 344 218" stroke="#7A5C40" stroke-width="2" fill="none"/>
  
  <!-- Nose -->
  <path d="M256 240 Q248 275 238 290 Q248 298 256 300 Q264 298 274 290 Q264 275 256 240" fill="#876550" opacity="0.7"/>
  <circle cx="242" cy="292" r="5" fill="#876550" opacity="0.4"/>
  <circle cx="270" cy="292" r="5" fill="#876550" opacity="0.4"/>
  
  <!-- Smile lines / nasolabial folds -->
  <path d="M218 290 Q212 310 215 335" stroke="#876550" stroke-width="2" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M294 290 Q300 310 297 335" stroke="#876550" stroke-width="2" fill="none" opacity="0.4" stroke-linecap="round"/>
  
  <!-- Stubble area -->
  <ellipse cx="256" cy="355" rx="70" ry="40" fill="#5A4A3E" opacity="0.15"/>
  <rect x="195" y="325" width="122" height="50" rx="20" fill="#5A4A3E" opacity="0.1"/>
  
  <!-- Stubble dots - salt and pepper -->
  <circle cx="220" cy="340" r="1.2" fill="#3D3530" opacity="0.4"/>
  <circle cx="230" cy="348" r="1.2" fill="#3D3530" opacity="0.4"/>
  <circle cx="240" cy="355" r="1.2" fill="#8A8480" opacity="0.5"/>
  <circle cx="250" cy="342" r="1.2" fill="#3D3530" opacity="0.4"/>
  <circle cx="260" cy="350" r="1.2" fill="#8A8480" opacity="0.5"/>
  <circle cx="270" cy="355" r="1.2" fill="#3D3530" opacity="0.4"/>
  <circle cx="280" cy="345" r="1.2" fill="#8A8480" opacity="0.5"/>
  <circle cx="290" cy="340" r="1.2" fill="#3D3530" opacity="0.4"/>
  <circle cx="235" cy="360" r="1.2" fill="#8A8480" opacity="0.4"/>
  <circle cx="255" cy="362" r="1.2" fill="#3D3530" opacity="0.4"/>
  <circle cx="275" cy="360" r="1.2" fill="#8A8480" opacity="0.4"/>
  <circle cx="215" cy="350" r="1.2" fill="#3D3530" opacity="0.35"/>
  <circle cx="295" cy="350" r="1.2" fill="#3D3530" opacity="0.35"/>
  <circle cx="245" cy="368" r="1.2" fill="#8A8480" opacity="0.4"/>
  <circle cx="265" cy="366" r="1.2" fill="#3D3530" opacity="0.4"/>
  
  <!-- Mouth - SS viseme: lips wide and slightly parted, teeth nearly closed -->
  <!-- Outer lips - wide stretched shape -->
  <path d="M218 330 Q230 325 256 325 Q282 325 294 330 Q298 335 294 340 Q282 346 256 346 Q230 346 218 340 Q214 335 218 330Z" fill="#7A4A3A"/>
  
  <!-- Teeth area - nearly closed, visible through slight part -->
  <path d="M224 331 Q240 328 256 328 Q272 328 288 331 Q290 335 288 339 Q272 342 256 342 Q240 342 224 339 Q222 335 224 331Z" fill="white"/>
  
  <!-- Upper teeth row -->
  <path d="M226 331 Q240 329 256 329 Q272 329 286 331 L286 335 Q272 334 256 334 Q240 334 226 335Z" fill="#F5F5F5"/>
  
  <!-- Tooth line separations -->
  <line x1="241" y1="330" x2="241" y2="335" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="249" y1="329" x2="249" y2="335" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="256" y1="329" x2="256" y2="335" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="263" y1="329" x2="263" y2="335" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="271" y1="330" x2="271" y2="335" stroke="#E0E0E0" stroke-width="0.5"/>
  
  <!-- Lower teeth hint -->
  <path d="M228 336 Q240 337 256 337 Q272 337 284 336 L284 339 Q272 341 256 341 Q240 341 228 339Z" fill="#EDEDED"/>
  
  <!-- Dark line between teeth rows - teeth nearly closed -->
  <path d="M226 335 Q240 335.5 256 335.5 Q272 335.5 286 335" stroke="#2A1A10" stroke-width="1" fill="none"/>
  
  <!-- Lip outline -->
  <path d="M218 330 Q230 325 256 325 Q282 325 294 330 Q298 335 294 340 Q282 346 256 346 Q230 346 218 340 Q214 335 218 330Z" stroke="#6A3A2A" stroke-width="1.5" fill="none"/>
  
  <!-- Upper lip definition -->
  <path d="M236 326 Q246 323 256 323 Q266 323 276 326" stroke="#6A3A2A" stroke-width="1" fill="none" opacity="0.5"/>
  
  <!-- Crow's feet / smile lines at eyes -->
  <path d="M165 235 Q158 230 155 238" stroke="#876550" stroke-width="1.5" fill="none" opacity="0.3" stroke-linecap="round"/>
  <path d="M347 235 Q354 230 357 238" stroke="#876550" stroke-width="1.5" fill="none" opacity="0.3" stroke-linecap="round"/>
</svg>