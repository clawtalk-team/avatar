  <ellipse cx="256" cy="369" rx="20" ry="7" fill="#E06060"/>
  <path d="M240 365 Q256 362 272 365" fill="#C85050" opacity="0.6"/>
  
  <!-- Upper lip -->
  <path d="M228 355 Q242 348 256 346 Q270 348 284 355" fill="none" stroke="#C07070" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Lower lip highlight -->
  <path d="M235 372 Q256 376 277 372" fill="none" stroke="#C07070" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Hair - silver bun -->
  <!-- Back hair -->
  <ellipse cx="256" cy="165" rx="135" ry="80" fill="#C0C0C0"/>
  
  <!-- Side hair left -->
  <path d="M126 200 Q120 240 130 270 Q135 240 140 210 Q145 180 160 160 Q140 170 126 200" fill="#B8B8B8"/>
  
  <!-- Side hair right -->
  <path d="M386 200 Q392 240 382 270 Q377 240 372 210 Q367 180 352 160 Q372 170 386 200" fill="#B8B8B8"/>
  
  <!-- Top hair -->
  <path d="M145 200 Q160 145 200 125 Q230 110 256 108 Q282 110 312 125 Q352 145 367 200 Q360 170 340 150 Q310 125 256 120 Q202 125 172 150 Q152 170 145 200" fill="#D0D0D0"/>
  
  <!-- Bun -->
  <circle cx="256" cy="120" r="40" fill="#C8C8C8"/>
  <circle cx="256" cy="120" r="35" fill="#D4D4D4"/>
  <!-- Bun swirl details -->
  <path d="M240 110 Q256 100 272 110 Q278 120 272 130 Q256 138 240 130 Q234 120 240 110" fill="none" stroke="#A8A8A8" stroke-width="2" opacity="0.6"/>
  <path d="M248 115 Q256 108 264 115 Q268 122 264 128 Q256 132 248 128 Q244 122 248 115" fill="none" stroke="#A8A8A8" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Hair pin -->
  <line x1="240" y1="105" x2="235" y2="90" stroke="#D4AF37" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="235" cy="88" r="4" fill="#D4AF37"/>
</svg>