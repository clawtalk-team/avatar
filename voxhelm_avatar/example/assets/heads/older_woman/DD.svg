  <path d="M352 260 Q364 258 369 255" fill="none" stroke="#E0C0A0" stroke-width="1.2" opacity="0.5"/>
  
  <!-- Nasolabial folds -->
  <path d="M218 300 Q215 320 222 345" fill="none" stroke="#E0C0A0" stroke-width="1.5" opacity="0.5"/>
  <path d="M294 300 Q297 320 290 345" fill="none" stroke="#E0C0A0" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Rosy cheeks -->
  <ellipse cx="190" cy="310" rx="28" ry="20" fill="#F5A0A0" opacity="0.4"/>
  <ellipse cx="322" cy="310" rx="28" ry="20" fill="#F5A0A0" opacity="0.4"/>
  
  <!-- Eyes - whites -->
  <ellipse cx="205" cy="260" rx="28" ry="22" fill="white"/>
  <ellipse cx="307" cy="260" rx="28" ry="22" fill="white"/>
  
  <!-- Eyes - iris -->
  <circle cx="208" cy="262" r="14" fill="#5B8C5A"/>
  <circle cx="310" cy="262" r="14" fill="#5B8C5A"/>
  
  <!-- Eyes - pupils -->
  <circle cx="210" cy="264" r="7" fill="#2D2D2D"/>
  <circle cx="312" cy="264" r="7" fill="#2D2D2D"/>
  
  <!-- Eyes - highlights -->
  <circle cx="214" cy="258" r="4" fill="white"/>
  <circle cx="316" cy="258" r="4" fill="white"/>
  
