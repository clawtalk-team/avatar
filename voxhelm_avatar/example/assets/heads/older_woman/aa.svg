  <!-- Teeth - upper row -->
  <rect x="238" y="349" width="36" height="10" fill="white" rx="3"/>
  
  <!-- Hair - silver bun -->
  <!-- Back hair volume -->
  <ellipse cx="256" cy="175" rx="135" ry="100" fill="#C0C0C0"/>
  <!-- Top of head hair -->
  <path d="M126 230 Q130 150 180 120 Q220 95 256 90 Q292 95 332 120 Q382 150 386 230" fill="#C8C8C8" stroke="none"/>
