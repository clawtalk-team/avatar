  <circle cx="256" cy="110" r="40" fill="none" stroke="#A0A0A0" stroke-width="2"/>
  <!-- Bun swirl details -->
  <path d="M240 100 Q256 95 270 105 Q275 115 265 120 Q250 125 245 115 Q240 108 248 103" fill="none" stroke="#9A9A9A" stroke-width="2" opacity="0.6"/>
  
