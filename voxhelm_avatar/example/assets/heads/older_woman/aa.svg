  <path d="M220 100 Q235 110 240 140" fill="none" stroke="#A8A8A8" stroke-width="1" opacity="0.4"/>
  <path d="M292 100 Q277 110 272 140" fill="none" stroke="#A8A8A8" stroke-width="1" opacity="0.4"/>
  
  <!-- Bun -->
