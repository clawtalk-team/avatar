  <circle cx="205" cy="260" r="34" fill="none" stroke="#8B6B50" stroke-width="3"/>
  <circle cx="307" cy="260" r="34" fill="none" stroke="#8B6B50" stroke-width="3"/>
  <path d="M239 258 Q256 265 273 258" fill="none" stroke="#8B6B50" stroke-width="2.5"/>
  <path d="M171 255 Q155 250 135 255" fill="none" stroke="#8B6B50" stroke-width="2.5"/>
  <path d="M341 255 Q357 250 377 255" fill="none" stroke="#8B6B50" stroke-width="2.5"/>
