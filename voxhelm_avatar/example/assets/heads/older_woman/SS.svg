  <path d="M277 228 Q307 218 334 232" fill="none" stroke="#9E9E9E" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Glasses frames (optional grandmotherly touch) -->
  
  <!-- Nose -->
  <path d="M250 285 Q253 305 248 320 Q256 325 264 320 Q259 305 262 285" fill="none" stroke="#D4A882" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Mouth - SS viseme: wide, slightly parted, teeth nearly closed -->
  <!-- Outer lips -->
  <path d="M222 355 Q240 350 256 350 Q272 350 290 355" fill="none" stroke="#C07070" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M222 355 Q240 362 256 363 Q272 362 290 355" fill="none" stroke="#C07070" stroke-width="2.5" stroke-linecap="round"/>
