  <line x1="242" y1="354" x2="242" y2="358" stroke="#E8E8E8" stroke-width="0.8"/>
  <line x1="256" y1="354" x2="256" y2="358" stroke="#E8E8E8" stroke-width="0.8"/>
  <line x1="270" y1="354" x2="270" y2="358" stroke="#E8E8E8" stroke-width="0.8"/>
  <!-- Upper lip -->
  <path d="M222 354 Q238 348 256 348 Q274 348 290 354" fill="#D4807A" stroke="none"/>
  <!-- Lower lip hint -->
  <path d="M228 360 Q256 366 284 360" fill="#D4807A" opacity="0.6" stroke="none"/>
  
  <!-- Hair - silver bun -->
  <!-- Back hair volume -->
  <ellipse cx="256" cy="175" rx="135" ry="80" fill="#C0C0C0"/>
  <!-- Side hair left -->
  <path d="M126 200 Q120 240 130 270 Q135 240 140 220 Q145 195 160 175 Q140 180 126 200" fill="#B8B8B8"/>
  <!-- Side hair right -->
  <path d="M386 200 Q392 240 382 270 Q377 240 372 220 Q367 195 352 175 Q372 180 386 200" fill="#B8B8B8"/>
  <!-- Top hair -->
  <path d="M140 200 Q160 140 200 120 Q240 105 256 105 Q272 105 312 120 Q352 140 372 200 Q360 160 320 140 Q280 120 256 120 Q232 120 192 140 Q152 160 140 200" fill="#C8C8C8"/>
  <!-- Bun -->
  <ellipse cx="256" cy="110" rx="45" ry="40" fill="#B0B0B0"/>
  <ellipse cx="256" cy="108" rx="35" ry="30" fill="#C0C0C0"/>
  <!-- Bun swirl detail -->
  <path d="M245 100 Q256 95 267 100 Q272 108 265 115 Q256 118 248 115 Q242 108 245 100" fill="none" stroke="#A0A0A0" stroke-width="2"/>
  
  <!-- Hair wisp details -->
  <path d="M170 190 Q180 180 195 178" fill="none" stroke="#A8A8A8" stroke-width="1.5" opacity="0.6"/>
  <path d="M342 190 Q332 180 317 178" fill="none" stroke="#A8A8A8" stroke-width="1.5" opacity="0.6"/>
