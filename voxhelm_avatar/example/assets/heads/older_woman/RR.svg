  <path d="M126 220 Q130 180 160 155 Q200 125 256 120 Q312 125 352 155 Q382 180 386 220 Q380 200 350 180 Q310 155 256 150 Q202 155 162 180 Q132 200 126 220" fill="#D0D0D5"/>
