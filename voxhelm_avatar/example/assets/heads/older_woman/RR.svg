  <path d="M240 110 Q256 100 272 110 Q278 120 272 130 Q256 138 240 130 Q234 120 240 110" fill="none" stroke="#A8A8B0" stroke-width="2" opacity="0.6"/>
  <path d="M248 115 Q256 110 264 115 Q268 122 264 128 Q256 132 248 128 Q244 122 248 115" fill="none" stroke="#A8A8B0" stroke-width="1.5" opacity="0.5"/>
  
