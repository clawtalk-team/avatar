<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" fill="#FFF5E6"/>
  
  <!-- Neck -->
  <rect x="220" y="390" width="72" height="60" fill="#F0D0B0" rx="10"/>
  
  <!-- Shoulders -->
  <ellipse cx="256" cy="470" rx="120" ry="50" fill="#7B5EA7"/>
  
  <!-- Collar/neckline -->
  <path d="M200 450 Q256 430 312 450" fill="none" stroke="#6B4E97" stroke-width="3"/>
  
  <!-- Ears -->
  <ellipse cx="130" cy="270" rx="22" ry="30" fill="#F0D0B0"/>
  <ellipse cx="130" cy="270" rx="12" ry="18" fill="#E8C0A0"/>
  <ellipse cx="382" cy="270" rx="22" ry="30" fill="#F0D0B0"/>
  <ellipse cx="382" cy="270" rx="12" ry="18" fill="#E8C0A0"/>
  
  <!-- Earrings -->
  <circle cx="130" cy="298" r="5" fill="#D4AF37"/>
  <circle cx="382" cy="298" r="5" fill="#D4AF37"/>
  
  <!-- Face shape -->
  <ellipse cx="256" cy="270" rx="130" ry="145" fill="#F5DAC0"/>
  
  <!-- Wrinkles - forehead -->
  <path d="M200 180 Q256 175 312 180" fill="none" stroke="#E0C0A0" stroke-width="1.5" opacity="0.6"/>
  <path d="M210 195 Q256 190 302 195" fill="none" stroke="#E0C0A0" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Wrinkles - crow's feet left -->
  <path d="M160 255 Q150 248 145 240" fill="none" stroke="#E0C0A0" stroke-width="1.2" opacity="0.5"/>
  <path d="M160 260 Q148 258 143 255" fill="none" stroke="#E0C0A0" stroke-width="1.2" opacity="0.5"/>
  
  <!-- Wrinkles - crow's feet right -->
  <path d="M352 255 Q362 248 367 240" fill="none" stroke="#E0C0A0" stroke-width="1.2" opacity="0.5"/>
  <path d="M352 260 Q364 258 369 255" fill="none" stroke="#E0C0A0" stroke-width="1.2" opacity="0.5"/>
  
  <!-- Nasolabial folds -->
  <path d="M218 300 Q215 320 222 345" fill="none" stroke="#E0C0A0" stroke-width="1.5" opacity="0.5"/>
  <path d="M294 300 Q297 320 290 345" fill="none" stroke="#E0C0A0" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Rosy cheeks -->
  <ellipse cx="190" cy="310" rx="28" ry="20" fill="#F5A0A0" opacity="0.4"/>
  <ellipse cx="322" cy="310" rx="28" ry="20" fill="#F5A0A0" opacity="0.4"/>
  
  <!-- Eyes - whites -->
  <ellipse cx="205" cy="260" rx="28" ry="22" fill="white"/>
  <ellipse cx="307" cy="260" rx="28" ry="22" fill="white"/>
  
  <!-- Eyes - iris -->
  <circle cx="208" cy="262" r="14" fill="#5B8C5A"/>
  <circle cx="310" cy="262" r="14" fill="#5B8C5A"/>
  
  <!-- Eyes - pupils -->
  <circle cx="210" cy="264" r="7" fill="#2D2D2D"/>
  <circle cx="312" cy="264" r="7" fill="#2D2D2D"/>
  
  <!-- Eyes - highlights -->
  <circle cx="214" cy="258" r="4" fill="white"/>
  <circle cx="316" cy="258" r="4" fill="white"/>
  
  <!-- Eyelids - upper -->
  <path d="M175 252 Q205 238 235 252" fill="none" stroke="#8B6B50" stroke-width="3" stroke-linecap="round"/>
  <path d="M277 252 Q307 238 337 252" fill="none" stroke="#8B6B50" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Eyelashes -->
  <path d="M175 252 Q172 246 170 242" fill="none" stroke="#8B6B50" stroke-width="2" stroke-linecap="round"/>
  <path d="M337 252 Q340 246 342 242" fill="none" stroke="#8B6B50" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Eyebrows -->
  <path d="M178 232 Q205 220 235 228" fill="none" stroke="#9E9E9E" stroke-width="4" stroke-linecap="round"/>
  <path d="M277 228 Q307 220 334 232" fill="none" stroke="#9E9E9E" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Glasses frames (optional grandmotherly touch) -->
  
  <!-- Nose -->
  <path d="M250 285 Q248 305 242 320 Q256 326 270 320 Q264 305 262 285" fill="none" stroke="#D4A88C" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Mouth - "I" viseme: barely open, lips wide and tightly spread -->
  <path d="M218 355 Q238 352 256 352 Q274 352 294 355" fill="none" stroke="#C06060" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="256" cy="356" rx="38" ry="5" fill="#8B2020"/>
  <path d="M218 358 Q238 362 256 362 Q274 362 294 358" fill="none" stroke="#C06060" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Teeth visible through narrow opening -->
  <ellipse cx="256" cy="356" rx="32" ry="3.5" fill="white"/>
  
  <!-- Hair - silver bun -->
  <!-- Base hair around head -->
  <path d="M126 240 Q126 140 200 110 Q256 90 312 110 Q386 140 386 240" fill="#C8C8D0" stroke="none"/>
  <!-- Hair volume on top -->
  <ellipse cx="256" cy="135" rx="95" ry="55" fill="#C8C8D0"/>
  <!-- Bun -->
  <circle cx="256" cy="95" r="40" fill="#B8B8C4"/>
  <circle cx="256" cy="95" r="40" fill="none" stroke="#A0A0AE" stroke-width="2"/>
  <!-- Bun swirl detail -->
  <path d="M240 85 Q256 75 270 88 Q275 100 260 105 Q248 108 244 98 Q242 90 250 87" fill="none" stroke="#A0A0AE" stroke-width="2"/>
  
  <!-- Hair sides covering top of ears -->
  <path d="M126 240 Q130 200 145 180 Q150 210 140 250 Q135 260 130 265" fill="#C8C8D0"/>
  <path d="M386 240 Q382 200 367 180 Q362 210 372 250 Q377 260 382 265" fill="#C8C8D0"/>
  
  <!-- Hair highlight -->
  <path d="M200 120 Q230 108 260 112" fill="none" stroke="#DDDDE5" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
</svg>