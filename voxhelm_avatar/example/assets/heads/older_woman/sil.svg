  <path d="M345 255 L372 248" stroke="#8B6B50" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Nose -->
  <path d="M256 280 Q248 305 240 315 Q248 320 256 320 Q264 320 272 315 Q264 305 256 280" fill="#E8C0A0" stroke="none"/>
  
  <!-- Mouth - closed, neutral (sil viseme) -->
  <path d="M222 355 Q240 358 256 358 Q272 358 290 355" fill="none" stroke="#C07060" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Slight smile lines at mouth corners -->
  <path d="M220 355 Q218 350 219 347" fill="none" stroke="#E0C0A0" stroke-width="1.5" opacity="0.5"/>
  <path d="M292 355 Q294 350 293 347" fill="none" stroke="#E0C0A0" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Hair - silver bun -->
  <!-- Base hair around head -->
  <path d="M126 240 Q126 140 200 110 Q256 90 312 110 Q386 140 386 240" fill="#C8C8D0" stroke="none"/>
  
  <!-- Hair sides -->
  <path d="M126 240 Q120 200 135 160 Q150 120 200 110" fill="#B8B8C0" stroke="none"/>
  <path d="M386 240 Q392 200 377 160 Q362 120 312 110" fill="#B8B8C0" stroke="none"/>
  
  <!-- Hair top detail -->
  <path d="M180 120 Q220 95 256 92 Q292 95 332 120" fill="#D0D0D8" stroke="none"/>
  
  <!-- Bun -->
  <ellipse cx="256" cy="100" rx="45" ry="38" fill="#C0C0C8"/>
  <ellipse cx="256" cy="95" rx="35" ry="28" fill="#D0D0D8"/>
  
  <!-- Bun swirl detail -->
  <path d="M240 90 Q256 80 270 90 Q280 100 265 105 Q250 108 245 100 Q242 95 248 92" fill="none" stroke="#A8A8B0" stroke-width="2"/>
  
  <!-- Hair wave lines -->
  <path d="M160 170 Q170 165 180 170" fill="none" stroke="#A8A8B0" stroke-width="1.5"/>
  <path d="M332 170 Q342 165 352 170" fill="none" stroke="#A8A8B0" stroke-width="1.5"/>
  <path d="M145 200 Q155 195 165 200" fill="none" stroke="#A8A8B0" stroke-width="1.5"/>
  <path d="M347 200 Q357 195 367 200" fill="none" stroke="#A8A8B0" stroke-width="1.5"/>
