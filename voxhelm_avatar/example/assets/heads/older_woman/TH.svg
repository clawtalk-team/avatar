  <ellipse cx="256" cy="358" rx="22" ry="8" fill="#4A1515"/>
  <!-- Upper teeth -->
  <rect x="238" y="353" width="36" height="7" fill="white" rx="2"/>
  <!-- Tooth line -->
  <line x1="250" y1="353" x2="250" y2="360" stroke="#E8E8E8" stroke-width="0.8"/>
  <line x1="262" y1="353" x2="262" y2="360" stroke="#E8E8E8" stroke-width="0.8"/>
  <line x1="256" y1="353" x2="256" y2="360" stroke="#E8E8E8" stroke-width="0.8"/>
  <!-- Tongue tip visible between teeth -->
  <ellipse cx="256" cy="362" rx="12" ry="5" fill="#E07070"/>
  <path d="M248 360 Q256 358 264 360 Q264 365 256 367 Q248 365 248 360" fill="#E07070"/>
  
  <!-- Hair - silver bun -->
  <!-- Base hair around head -->
  <path d="M126 240 Q130 160 180 130 Q220 105 256 100 Q292 105 332 130 Q382 160 386 240 Q386 210 370 190 Q340 150 256 145 Q172 150 142 190 Q126 210 126 240" fill="#C0C0C8"/>
  <!-- Hair top volume -->
  <path d="M150 200 Q160 140 210 120 Q240 108 256 105 Q272 108 302 120 Q352 140 362 200" fill="#B8B8C4" stroke="none"/>
  <!-- Silver bun on top -->
  <ellipse cx="256" cy="105" rx="45" ry="35" fill="#C8C8D0"/>
  <ellipse cx="256" cy="100" rx="38" ry="28" fill="#D0D0D8"/>
  <!-- Bun swirl detail -->
  <path d="M240 95 Q256 85 270 95 Q275 105 265 108 Q256 112 248 108 Q238 105 240 95" fill="none" stroke="#A8A8B0" stroke-width="2"/>
  <!-- Hair sides -->
  <path d="M126 240 Q128 220 140 200 Q145 230 148 260" fill="#C0C0C8"/>
  <path d="M386 240 Q384 220 372 200 Q367 230 364 260" fill="#C0C0C8"/>
  
  <!-- Glasses -->
  <circle cx="205" cy="260" r="34" fill="none" stroke="#8B6B50" stroke-width="3"/>
  <circle cx="307" cy="260" r="34" fill="none" stroke="#8B6B50" stroke-width="3"/>
  <path d="M239 258 Q256 265 273 258" fill="none" stroke="#8B6B50" stroke-width="2.5"/>
  <path d="M171 255 L148 248" stroke="#8B6B50" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M341 255 L364 248" stroke="#8B6B50" stroke-width="2.5" stroke-linecap="round"/>
</svg>