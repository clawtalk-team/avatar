  <ellipse cx="307" cy="260" rx="34" ry="28" fill="none" stroke="#A08060" stroke-width="2" opacity="0.4"/>
  <path d="M239 258 Q256 265 273 258" fill="none" stroke="#A08060" stroke-width="1.5" opacity="0.4"/>
  
