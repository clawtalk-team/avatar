  <path d="M245 300 Q256 308 267 300" fill="none" stroke="#D4A880" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Mouth - "kk" viseme: open mouth, back of tongue raised, mid-open -->
  <!-- Outer lip shape - open mouth -->
  <path d="M228 350 Q240 344 256 344 Q272 344 284 350 Q290 358 288 368 Q280 380 256 382 Q232 380 224 368 Q222 358 228 350 Z" fill="#2D1010"/>
  <!-- Upper lip -->
  <path d="M228 350 Q240 344 256 344 Q272 344 284 350 Q272 354 256 354 Q240 354 228 350 Z" fill="#C06060"/>
  <!-- Lower lip -->
  <path d="M224 368 Q232 380 256 382 Q280 380 288 368 Q280 374 256 376 Q232 374 224 368 Z" fill="#D07070"/>
  <!-- Tongue raised at back -->
  <path d="M234 365 Q244 362 256 362 Q268 362 278 365 Q280 372 272 376 Q264 378 256 378 Q248 378 240 376 Q232 372 234 365 Z" fill="#D05050"/>
