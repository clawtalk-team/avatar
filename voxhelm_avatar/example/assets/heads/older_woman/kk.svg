  <path d="M170 160 Q200 145 230 155" fill="none" stroke="#A8A8B0" stroke-width="2" opacity="0.6"/>
  <path d="M270 150 Q300 140 340 160" fill="none" stroke="#A8A8B0" stroke-width="2" opacity="0.6"/>
  <!-- Bun -->
  <circle cx="256" cy="120" r="40" fill="#C0C0C8"/>
  <circle cx="256" cy="120" r="38" fill="#C8C8D0"/>
  <!-- Bun spiral details -->
  <path d="M240 110 Q256 100 272 110 Q280 120 272 130 Q256 138 240 130 Q232 120 240 110" fill="none" stroke="#A8A8B0" stroke-width="2" opacity="0.5"/>
  <path d="M248 115 Q256 110 264 115 Q268 120 264 125 Q256 128 248 125 Q244 120 248 115" fill="none" stroke="#A8A8B0" stroke-width="1.5" opacity="0.5"/>
  <!-- Hair pin -->
  <line x1="240" y1="105" x2="235" y2="95" stroke="#D4AF37" stroke-width="2"/>
  <circle cx="235" cy="93" r="3" fill="#D4AF37"/>
</svg>