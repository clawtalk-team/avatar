  <path d="M250 364 Q256 358 262 364 Q268 360 274 365 Q270 368 262 367 Q256 366 250 367 Q246 366 250 364 Z" fill="#C04545"/>
  <!-- Teeth hint - upper -->
  <path d="M236 350 Q256 348 276 350 L276 356 Q256 354 236 356 Z" fill="#F8F8F0" opacity="0.8"/>
  
  <!-- Hair - silver bun -->
  <!-- Back hair mass -->
  <ellipse cx="256" cy="175" rx="135" ry="100" fill="#C8C8D0"/>
  <!-- Hair sides -->
  <path d="M126 200 Q120 250 130 280 Q135 250 140 220 Q150 180 180 160 Q150 170 126 200 Z" fill="#B8B8C0"/>
  <path d="M386 200 Q392 250 382 280 Q377 250 372 220 Q362 180 332 160 Q362 170 386 200 Z" fill="#B8B8C0"/>
  <!-- Top hair -->
  <path d="M150 200 Q170 130 256 120 Q342 130 362 200 Q350 160 310 140 Q256 125 202 140 Q162 160 150 200 Z" fill="#D0D0D8"/>
