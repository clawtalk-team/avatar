  <ellipse cx="297" cy="252" rx="12" ry="13" fill="#4A3020"/>
  
  <!-- Pupils -->
  <circle cx="223" cy="252" r="5" fill="#1A1A1A"/>
  <circle cx="298" cy="252" r="5" fill="#1A1A1A"/>
  
  <!-- Eye highlights -->
  <circle cx="226" cy="247" r="3" fill="white"/>
  <circle cx="301" cy="247" r="3" fill="white"/>
  
  <!-- Eyelashes/lids -->
  <path d="M198 245 Q220 235 242 245" stroke="#3D2B1F" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M273 245 Q295 235 317 245" stroke="#3D2B1F" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Nose -->
  <path d="M252 280 Q248 295 244 305 Q250 310 258 310 Q264 305 260 295 Z" fill="#8A5D3A" opacity="0.6"/>
  
  <!-- Mouth - CH viseme: rounded, slightly forward, slightly open -->
  <!-- Outer lip shape - rounded oval opening -->
  <ellipse cx="256" cy="340" rx="18" ry="14" fill="#1A1A1A"/>
  <!-- Inner mouth (dark opening) -->
  <ellipse cx="256" cy="340" rx="13" ry="9" fill="#3D1515"/>
  <!-- Upper lip -->
  <path d="M238 335 Q244 328 256 327 Q268 328 274 335 Q268 332 256 331 Q244 332 238 335 Z" fill="#9E5040"/>
  <!-- Lower lip -->
  <path d="M239 346 Q248 355 256 356 Q264 355 273 346 Q265 350 256 351 Q247 350 239 346 Z" fill="#B86050"/>
