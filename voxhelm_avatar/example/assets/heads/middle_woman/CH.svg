  <path d="M236 336 Q240 326 256 325 Q272 326 276 336" stroke="#7A3A30" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M236 344 Q240 356 256 358 Q272 356 276 344" stroke="#7A3A30" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Smile lines / cheek creases -->
  <path d="M230 330 Q226 335 228 345" stroke="#8A5D3A" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M282 330 Q286 335 284 345" stroke="#8A5D3A" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
