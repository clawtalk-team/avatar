  <path d="M230 336 Q256 334, 282 336 Q256 340, 230 336 Z" fill="#FFFFFF"/>
  
  <!-- Hair front/bangs -->
  <path d="M140 220 C150 160, 200 120, 256 115 C312 120, 362 160, 372 220 C360 190, 320 165, 256 160 C192 165, 152 190, 140 220 Z" fill="#8B3A1A"/>
  <path d="M160 230 C165 185, 200 145, 240 140 C210 160, 185 190, 175 230 Z" fill="#7A3218"/>
  <path d="M352 230 C347 185, 312 145, 272 140 C302 160, 327 190, 337 230 Z" fill="#7A3218"/>
  
  <!-- Blush -->
  <ellipse cx="195" cy="300" rx="18" ry="10" fill="#F5A0A0" opacity="0.3"/>
  <ellipse cx="317" cy="300" rx="18" ry="10" fill="#F5A0A0" opacity="0.3"/>
</svg>