  <line x1="249" y1="332" x2="249" y2="342" stroke="#E8E0D8" stroke-width="1"/>
  <line x1="256" y1="332" x2="256" y2="342" stroke="#E8E0D8" stroke-width="1"/>
  <line x1="263" y1="332" x2="263" y2="342" stroke="#E8E0D8" stroke-width="1"/>
  
  <!-- Upper lip line -->
  <path d="M232 332 Q244 328, 256 330 Q268 328, 280 332" fill="none" stroke="#C94848" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Lower lip highlight -->
  <path d="M242 345 Q256 350, 270 345" fill="#E86A6A" opacity="0.4"/>
  
  <!-- Hair front -->
  <path d="M145 200 Q160 140, 210 120 Q240 110, 256 108 Q272 110, 302 120 Q352 140, 367 200 Q360 170, 330 155 Q290 135, 256 133 Q222 135, 182 155 Q152 170, 145 200 Z" fill="#8B3A1A"/>
  
  <!-- Hair bangs/fringe -->
  <path d="M160 210 Q170 160, 200 140 Q210 135, 220 150 Q215 170, 210 200 Z" fill="#9B4420"/>
  <path d="M190 200 Q200 150, 230 132 Q240 128, 245 140 Q240 160, 235 195 Z" fill="#8B3A1A"/>
  <path d="M225 190 Q235 140, 258 128 Q270 128, 280 140 Q275 160, 275 190 Z" fill="#9B4420"/>
  <path d="M265 195 Q275 145, 300 135 Q310 132, 315 145 Q310 165, 305 200 Z" fill="#8B3A1A"/>
  <path d="M300 200 Q315 155, 340 148 Q352 150, 355 165 Q345 180, 340 210 Z" fill="#9B4420"/>
  
  <!-- Cheek blush -->
  <ellipse cx="195" cy="300" rx="18" ry="12" fill="#F5A08A" opacity="0.35"/>
  <ellipse cx="317" cy="300" rx="18" ry="12" fill="#F5A08A" opacity="0.35"/>
</svg>