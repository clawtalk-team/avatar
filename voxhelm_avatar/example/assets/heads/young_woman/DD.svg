<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="#FFF5E6"/>
  
  <!-- Hair back -->
  <ellipse cx="256" cy="260" rx="155" ry="180" fill="#8B3A1A"/>
  
  <!-- Long hair strands falling down -->
  <path d="M101 260 C95 320, 90 380, 105 460 L140 460 C130 380, 125 320, 130 260 Z" fill="#8B3A1A"/>
  <path d="M411 260 C417 320, 422 380, 407 460 L372 460 C382 380, 387 320, 382 260 Z" fill="#8B3A1A"/>
  <path d="M120 280 C110 340, 108 400, 120 460 L155 460 C145 400, 140 340, 145 280 Z" fill="#7A3218"/>
  <path d="M392 280 C402 340, 404 400, 392 460 L357 460 C367 400, 372 340, 367 280 Z" fill="#7A3218"/>
  
  <!-- Neck -->
  <rect x="226" y="370" width="60" height="60" fill="#FDDCB5"/>
