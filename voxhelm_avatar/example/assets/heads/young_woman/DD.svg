  <!-- Shoulders -->
  <path d="M180 430 Q256 415, 332 430 Q340 470, 350 512 L162 512 Q170 470, 180 430 Z" fill="#E85D4A"/>
  
  <!-- Collar detail -->
  <path d="M226 430 Q256 450, 286 430" fill="none" stroke="#C94535" stroke-width="2"/>
  
  <!-- Face shape -->
  <ellipse cx="256" cy="265" rx="120" ry="135" fill="#FDDCB5"/>
  
  <!-- Ears -->
  <ellipse cx="136" cy="275" rx="18" ry="25" fill="#FDDCB5"/>
  <ellipse cx="136" cy="275" rx="10" ry="15" fill="#F5C9A0"/>
  <ellipse cx="376" cy="275" rx="18" ry="25" fill="#FDDCB5"/>
  <ellipse cx="376" cy="275" rx="10" ry="15" fill="#F5C9A0"/>
  
  <!-- Freckles -->
  <circle cx="215" cy="290" r="3" fill="#D4A574" opacity="0.6"/>
  <circle cx="225" cy="295" r="2.5" fill="#D4A574" opacity="0.5"/>
  <circle cx="208" cy="298" r="2" fill="#D4A574" opacity="0.5"/>
  <circle cx="220" cy="285" r="2" fill="#D4A574" opacity="0.4"/>
  <circle cx="297" cy="290" r="3" fill="#D4A574" opacity="0.6"/>
  <circle cx="287" cy="295" r="2.5" fill="#D4A574" opacity="0.5"/>
  <circle cx="304" cy="298" r="2" fill="#D4A574" opacity="0.5"/>
  <circle cx="292" cy="285" r="2" fill="#D4A574" opacity="0.4"/>
  
  <!-- Eyebrows -->
  <path d="M195 210 Q220 198, 245 205" fill="none" stroke="#5C2810" stroke-width="5" stroke-linecap="round"/>
  <path d="M267 205 Q292 198, 317 210" fill="none" stroke="#5C2810" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Eyes - whites -->
  <ellipse cx="220" cy="250" rx="28" ry="26" fill="white"/>
  <ellipse cx="292" cy="250" rx="28" ry="26" fill="white"/>
  
  <!-- Eyes - iris -->
  <ellipse cx="222" cy="253" rx="16" ry="18" fill="#4A8B5C"/>
  <ellipse cx="294" cy="253" rx="16" ry="18" fill="#4A8B5C"/>
  
  <!-- Eyes - pupils -->
  <circle cx="224" cy="253" r="8" fill="#1A1A1A"/>
  <circle cx="296" cy="253" r="8" fill="#1A1A1A"/>
  
  <!-- Eye highlights -->
  <circle cx="228" cy="246" r="4" fill="white"/>
  <circle cx="300" cy="246" r="4" fill="white"/>
  <circle cx="220" cy="258" r="2" fill="white" opacity="0.6"/>
  <circle cx="292" cy="258" r="2" fill="white" opacity="0.6"/>
  
  <!-- Eyelashes -->
  <path d="M192 240 Q193 235, 196 233" fill="none" stroke="#3A1A0A" stroke-width="2" stroke-linecap="round"/>
  <path d="M320 240 Q319 235, 316 233" fill="none" stroke="#3A1A0A" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Eye outlines -->
  <ellipse cx="220" cy="250" rx="28" ry="26" fill="none" stroke="#3A1A0A" stroke-width="2"/>
  <ellipse cx="292" cy="250" rx="28" ry="26" fill="none" stroke="#3A1A0A" stroke-width="2"/>
  
  <!-- Nose -->
  <path d="M252 290 Q256 300, 260 290" fill="none" stroke="#E8A880" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Mouth - DD viseme: slightly open, tongue tip behind upper teeth -->
  <!-- Outer mouth shape (lips) -->
  <path d="M230 335 Q243 330, 256 332 Q269 330, 282 335 Q275 352, 256 355 Q237 352, 230 335 Z" fill="#2A1A1A"/>
  
  <!-- Upper teeth row -->
  <path d="M234 335 Q256 333, 278 335 L278 342 Q256 340, 234 342 Z" fill="#FFFFFF"/>
  
  <!-- Tooth separations -->
  <line x1="248" y1="335" x2="248" y2="342" stroke="#E0E0E0" stroke-width="0.8"/>
  <line x1="256" y1="334" x2="256" y2="341" stroke="#E0E0E0" stroke-width="0.8"/>
  <line x1="264" y1="335" x2="264" y2="342" stroke="#E0E0E0" stroke-width="0.8"/>
  
  <!-- Tongue behind upper teeth -->
  <path d="M240 344 Q256 350, 272 344 Q268 353, 256 355 Q244 353, 240 344 Z" fill="#D4565A"/>
  
  <!-- Upper lip -->
  <path d="M230 335 Q243 330, 256 332 Q269 330, 282 335" fill="none" stroke="#C94535" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Lower lip -->
  <path d="M233 348 Q256 358, 279 348" fill="none" stroke="#C94535" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Blush -->
  <ellipse cx="195" cy="305" rx="20" ry="12" fill="#F5A0A0" opacity="0.3"/>
  <ellipse cx="317" cy="305" rx="20" ry="12" fill="#F5A0A0" opacity="0.3"/>
  
  <!-- Hair front -->
  <path d="M140 200 Q160 130, 220 110 Q256 100, 292 110 Q352 130, 372 200 Q360 170, 330 155 Q290 135, 256 138 Q222 135, 182 155 Q152 170, 140 200 Z" fill="#8B3A1A"/>
  
  <!-- Hair bangs/fringe -->
  <path d="M155 210 Q170 160, 210 140 Q195 170, 190 210 Z" fill="#7A3218"/>
  <path d="M180 200 Q200 150, 240 135 Q220 160, 215 200 Z" fill="#8B3A1A"/>
  <path d="M210 195 Q235 140, 270 135 Q250 155, 245 195 Z" fill="#7A3218"/>
  <path d="M250 195 Q275 140, 310 140 Q290 160, 280 195 Z" fill="#8B3A1A"/>
  <path d="M300 200 Q320 155, 350 150 Q340 170, 330 205 Z" fill="#7A3218"/>
  <path d="M330 210 Q345 165, 365 160 Q358 180, 350 215 Z" fill="#8B3A1A"/>
</svg>