  <path d="M155 220 Q160 160, 200 140 Q180 170, 175 220 Z" fill="#7A3218"/>
  <path d="M175 200 Q185 145, 230 125 Q210 155, 200 200 Z" fill="#8B3A1A"/>
  <path d="M210 190 Q225 135, 270 120 Q250 145, 240 190 Z" fill="#7A3218"/>
  <path d="M250 185 Q268 130, 310 125 Q290 150, 278 185 Z" fill="#8B3A1A"/>
  <path d="M300 195 Q320 145, 355 150 Q335 165, 320 200 Z" fill="#7A3218"/>
  
  <!-- Blush -->
  <ellipse cx="195" cy="300" rx="20" ry="12" fill="#FFB5A0" opacity="0.3"/>
  <ellipse cx="317" cy="300" rx="20" ry="12" fill="#FFB5A0" opacity="0.3"/>
