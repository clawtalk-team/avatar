  <path d="M236 335 Q236 320, 256 318 Q276 320, 276 335 Q276 352, 256 355 Q236 352, 236 335 Z" fill="none" stroke="#C44040" stroke-width="2.5"/>
  
  <!-- Hair front -->
  <path d="M140 200 Q150 130, 220 110 Q256 100, 292 110 Q362 130, 372 200 Q370 180, 340 160 Q300 135, 256 132 Q212 135, 172 160 Q145 180, 140 200 Z" fill="#8B3A1A"/>
  
