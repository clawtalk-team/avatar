<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="#FFF5E6"/>
  
  <!-- Hair back -->
  <ellipse cx="256" cy="260" rx="155" ry="180" fill="#8B3A1A"/>
  
  <!-- Long hair strands falling down -->
  <path d="M101 260 C95 320, 90 380, 105 460 L140 460 C130 380, 125 320, 130 260 Z" fill="#8B3A1A"/>
  <path d="M411 260 C417 320, 422 380, 407 460 L372 460 C382 380, 387 320, 382 260 Z" fill="#8B3A1A"/>
  <path d="M120 280 C110 340, 108 400, 120 460 L155 460 C145 400, 140 340, 145 280 Z" fill="#7A3218"/>
  <path d="M392 280 C402 340, 404 400, 392 460 L357 460 C367 400, 372 340, 367 280 Z" fill="#7A3218"/>
  
  <!-- Neck -->
  <rect x="226" y="370" width="60" height="60" fill="#FDDCB5"/>
  <path d="M226 370 Q256 390, 286 370 L286 430 L226 430 Z" fill="#FDDCB5"/>
  
  <!-- Shoulders -->
  <path d="M180 430 Q256 415, 332 430 Q340 470, 350 512 L162 512 Q170 470, 180 430 Z" fill="#E85D4A"/>
  
  <!-- Collar detail -->
  <path d="M226 430 Q256 450, 286 430" fill="none" stroke="#C94535" stroke-width="2"/>
  
  <!-- Face shape -->
  <ellipse cx="256" cy="265" rx="120" ry="135" fill="#FDDCB5"/>
  
  <!-- Ears -->
  <ellipse cx="136" cy="275" rx="18" ry="25" fill="#FDDCB5"/>
  <ellipse cx="136" cy="275" rx="10" ry="15" fill="#F5C9A0"/>
  <ellipse cx="376" cy="275" rx="18" ry="25" fill="#FDDCB5"/>
  <ellipse cx="376" cy="275" rx="10" ry="15" fill="#F5C9A0"/>
  
  <!-- Freckles -->
  <circle cx="215" cy="290" r="3" fill="#D4A574" opacity="0.6"/>
  <circle cx="225" cy="295" r="2.5" fill="#D4A574" opacity="0.5"/>
  <circle cx="208" cy="298" r="2" fill="#D4A574" opacity="0.5"/>
  <circle cx="220" cy="285" r="2" fill="#D4A574" opacity="0.4"/>
  <circle cx="297" cy="290" r="3" fill="#D4A574" opacity="0.6"/>
  <circle cx="287" cy="295" r="2.5" fill="#D4A574" opacity="0.5"/>
  <circle cx="304" cy="298" r="2" fill="#D4A574" opacity="0.5"/>
  <circle cx="292" cy="285" r="2" fill="#D4A574" opacity="0.4"/>
  
  <!-- Eyebrows -->
  <path d="M195 210 Q220 198, 245 205" fill="none" stroke="#5C2810" stroke-width="5" stroke-linecap="round"/>
  <path d="M267 205 Q292 198, 317 210" fill="none" stroke="#5C2810" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Eyes - whites -->
  <ellipse cx="220" cy="250" rx="28" ry="26" fill="white"/>
  <ellipse cx="292" cy="250" rx="28" ry="26" fill="white"/>
  
  <!-- Eyes - iris -->
  <ellipse cx="222" cy="253" rx="16" ry="18" fill="#4A8B5C"/>
  <ellipse cx="294" cy="253" rx="16" ry="18" fill="#4A8B5C"/>
  
  <!-- Eyes - pupils -->
  <circle cx="224" cy="253" r="8" fill="#1A1A1A"/>
  <circle cx="296" cy="253" r="8" fill="#1A1A1A"/>
  
  <!-- Eye highlights -->
  <circle cx="228" cy="246" r="4" fill="white"/>
  <circle cx="300" cy="246" r="4" fill="white"/>
  <circle cx="220" cy="258" r="2" fill="white" opacity="0.6"/>
  <circle cx="292" cy="258" r="2" fill="white" opacity="0.6"/>
  
  <!-- Eyelashes top -->
  <path d="M192 240 Q220 228, 248 240" fill="none" stroke="#3A1A0A" stroke-width="3" stroke-linecap="round"/>
  <path d="M264 240 Q292 228, 320 240" fill="none" stroke="#3A1A0A" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Nose -->
  <path d="M252 290 Q256 300, 260 290" fill="none" stroke="#E8B090" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Mouth - "U" viseme: tightly rounded lips, small circular opening like a kiss -->
  <ellipse cx="256" cy="335" rx="14" ry="15" fill="#C94040"/>
  <ellipse cx="256" cy="335" rx="8" ry="9" fill="#3A1010"/>
  <!-- Upper lip outline -->
  <path d="M242 330 Q249 324, 256 325 Q263 324, 270 330" fill="none" stroke="#B03535" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Lower lip highlight -->
  <ellipse cx="256" cy="341" rx="9" ry="5" fill="#D94A4A" opacity="0.5"/>
  <!-- Lip pucker wrinkles -->
  <path d="M244 335 Q242 335, 241 335" fill="none" stroke="#B08080" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M268 335 Q270 335, 271 335" fill="none" stroke="#B08080" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Blush -->
  <ellipse cx="195" cy="300" rx="20" ry="12" fill="#F0A0A0" opacity="0.3"/>
  <ellipse cx="317" cy="300" rx="20" ry="12" fill="#F0A0A0" opacity="0.3"/>
  
  <!-- Hair front/bangs -->
  <path d="M140 200 Q160 140, 220 130 Q256 120, 292 130 Q352 140, 372 200 Q350 170, 310 160 Q256 145, 202 160 Q162 170, 140 200 Z" fill="#8B3A1A"/>
  <path d="M150 210 Q170 160, 220 145 Q240 140, 256 138 Q200 155, 175 190 Q160 210, 155 230 Z" fill="#7A3218"/>
  <path d="M362 210 Q342 160, 292 145 Q272 140, 256 138 Q312 155, 337 190 Q352 210, 357 230 Z" fill="#7A3218"/>
  
  <!-- Hair side pieces -->
  <path d="M136 260 Q130 240, 145 210 Q155 190, 170 180 Q155 200, 148 230 Q142 250, 140 270 Z" fill="#8B3A1A"/>
  <path d="M376 260 Q382 240, 367 210 Q357 190, 342 180 Q357 200, 364 230 Q370 250, 372 270 Z" fill="#8B3A1A"/>
</svg>