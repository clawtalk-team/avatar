<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Viseme Animation Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #F0EDE8;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex; flex-direction: column; align-items: center;
      padding: 32px 16px; min-height: 100vh;
    }
    h1 { font-size: 22px; color: #2A1A0A; margin-bottom: 6px; }
    .sentence { font-size: 18px; font-style: italic; color: #5C3A1E; margin-bottom: 28px; }

    #avatar-wrap { width: 300px; height: 300px; margin-bottom: 16px; }
    #avatar-wrap svg { width: 100%; height: 100%; display: block; }

    #viseme-badge {
      background: #5C3A1E; color: #fff; font-size: 15px; font-weight: 700;
      padding: 4px 14px; border-radius: 20px; margin-bottom: 20px;
      min-width: 80px; text-align: center;
    }

    .controls { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; }
    button {
      background: #5C3A1E; color: #fff; border: none; border-radius: 8px;
      padding: 10px 24px; font-size: 15px; font-weight: 600; cursor: pointer;
    }
    button:hover { background: #7A5030; }
    .speed-group { display: flex; border: 2px solid #5C3A1E; border-radius: 8px; overflow: hidden; }
    .speed-group button {
      border-radius: 0; background: transparent; color: #5C3A1E;
      padding: 10px 16px; border-right: 1px solid #5C3A1E;
    }
    .speed-group button:last-child { border-right: none; }
    .speed-group button.active { background: #5C3A1E; color: #fff; }

    #timeline { width: 300px; height: 8px; background: #D9D0C8; border-radius: 4px; margin-bottom: 32px; overflow: hidden; }
    #timeline-fill { height: 100%; background: #5C3A1E; border-radius: 4px; width: 0%; }

    .grid-title { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 12px; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 100%; max-width: 520px; }
    .grid-cell {
      background: #fff; border-radius: 10px; padding: 6px 4px 4px; text-align: center;
      box-shadow: 0 2px 6px #0001; border: 2px solid transparent;
    }
    .grid-cell.active { border-color: #5C3A1E; background: #F5EBE0; }
    .grid-cell img { width: 100%; aspect-ratio: 1; display: block; }
    .grid-cell .name { font-size: 12px; font-weight: 700; color: #2A1A0A; margin-top: 2px; }
    .grid-cell .phones { font-size: 9px; color: #aaa; }
  </style>
</head>
<body>

<h1>Viseme Animation Demo</h1>
<p class="sentence" id="sentence-text">"Hello, how are you today?"</p>

<audio id="audio" preload="auto"></audio>

<div id="avatar-wrap">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="skinGrad" cx="45%" cy="38%" r="58%">
      <stop offset="0%"   stop-color="#FDD8BC"/>
      <stop offset="65%"  stop-color="#F5C5A3"/>
      <stop offset="100%" stop-color="#E8A87C"/>
    </radialGradient>
    <radialGradient id="hairGrad" cx="40%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="#7A5030"/>
      <stop offset="100%" stop-color="#3A2010"/>
    </radialGradient>
    <radialGradient id="cheekL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F0A898" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#F0A898" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cheekR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F0A898" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#F0A898" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#00000028"/>
    </filter>
    <!-- Clip: show hair ellipse only ABOVE the hairline -->
    <clipPath id="hairClip">
      <rect x="0" y="0" width="512" height="154.0"/>
    </clipPath>
    <!-- Clip: show hair sides (below hairline, outside face oval) -->
    <clipPath id="hairSideClip">
      <rect x="0" y="154.0" width="512" height="358.0"/>
    </clipPath>
    <clipPath id="headClip">
      <ellipse cx="256" cy="262" rx="151" ry="195"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#F0EDE8"/>

  <!-- Neck (behind everything) -->
  <rect x="218" y="432" width="76" height="85"
        rx="20" fill="#F5C5A3" stroke="#2A1A0A" stroke-width="2.5"/>

  <!-- Ears (behind head) -->
  <ellipse cx="116" cy="250" rx="15" ry="24"
           fill="#F5C5A3" stroke="#2A1A0A" stroke-width="2.5"/>
  <ellipse cx="396" cy="250" rx="15" ry="24"
           fill="#F5C5A3" stroke="#2A1A0A" stroke-width="2.5"/>

  <!-- Hair bulk: full ellipse clipped to above hairline (top of head + volume) -->
  <ellipse cx="256" cy="214.0" rx="164" ry="214"
           fill="url(#hairGrad)" clip-path="url(#hairClip)"/>

  <!-- Hair sides: small sideburn strips below hairline, outside face oval -->
  <!-- Left sideburn -->
  <ellipse cx="112" cy="182.0"
           rx="18" ry="32"
           fill="url(#hairGrad)" clip-path="url(#hairSideClip)"/>
  <!-- Right sideburn -->
  <ellipse cx="400" cy="182.0"
           rx="18" ry="32"
           fill="url(#hairGrad)" clip-path="url(#hairSideClip)"/>

  <!-- Hair highlight (sheen on top) -->
  <ellipse cx="236" cy="30.0" rx="38" ry="14"
           fill="white" fill-opacity="0.14" clip-path="url(#hairClip)"/>

  <!-- Hair texture lines (subtle strands) -->
  <g stroke="#2A1408" stroke-width="1.4" stroke-linecap="round" fill="none"
     stroke-opacity="0.35" clip-path="url(#hairClip)">
    <path d="M 206,8.0 Q 226,40.0 196,144.0"/>
    <path d="M 256,5.0      Q 266,50.0 246,146.0"/>
    <path d="M 306,8.0 Q 286,40.0 311,144.0"/>
  </g>

  <!-- Head oval (face skin) — drawn over the hair bottom edge to form clean hairline -->
  <ellipse cx="256" cy="262" rx="148" ry="192"
           fill="url(#skinGrad)" stroke="#2A1A0A" stroke-width="3"
           filter="url(#softShadow)"/>

  <!-- Hair outline stroke along hairline (crisp edge between hair and forehead) -->
  <!-- This is just the top arc of the head ellipse, traced in hair colour -->
  <ellipse cx="256" cy="262" rx="148" ry="192"
           fill="none" stroke="#5C3A1E" stroke-width="2.5"
           stroke-dasharray="1000"
           stroke-dashoffset="587"
           clip-path="url(#hairClip)"/>

  <!-- Eyebrows -->
  <path d="M 176,176
            Q 200,168
              216,178"
        fill="none" stroke="#5C3A1E" stroke-width="5" stroke-linecap="round"/>
  <path d="M 296,178
            Q 312,168
              336,176"
        fill="none" stroke="#5C3A1E" stroke-width="5" stroke-linecap="round"/>

  <!-- Eyes: whites -->
  <ellipse cx="196" cy="212" rx="28" ry="24"
           fill="#FFFFFF" stroke="#2A1A0A" stroke-width="2.5"/>
  <ellipse cx="316" cy="212" rx="28" ry="24"
           fill="#FFFFFF" stroke="#2A1A0A" stroke-width="2.5"/>

  <!-- Irises -->
  <circle cx="196" cy="212" r="14"
          fill="#6B4C2A" stroke="#2A1A0A" stroke-width="1.5"/>
  <circle cx="316" cy="212" r="14"
          fill="#6B4C2A" stroke="#2A1A0A" stroke-width="1.5"/>

  <!-- Pupils -->
  <circle cx="196" cy="212" r="7" fill="#1A1A1A"/>
  <circle cx="316" cy="212" r="7" fill="#1A1A1A"/>

  <!-- Eye highlights -->
  <circle cx="202" cy="206" r="4" fill="white" fill-opacity="0.85"/>
  <circle cx="322" cy="206" r="4" fill="white" fill-opacity="0.85"/>

  <!-- Nose -->
  <ellipse cx="256" cy="284" rx="10" ry="7"
           fill="#E8A87C" stroke="#2A1A0A" stroke-width="1.5" fill-opacity="0.6"/>
  <!-- Nostrils -->
  <ellipse cx="249" cy="287" rx="5" ry="3.5"
           fill="#2A1A0A" fill-opacity="0.35"/>
  <ellipse cx="263" cy="287" rx="5" ry="3.5"
           fill="#2A1A0A" fill-opacity="0.35"/>

  <!-- Cheek blush -->
  <ellipse cx="188" cy="256" rx="30" ry="17"
           fill="url(#cheekL)"/>
  <ellipse cx="324" cy="256" rx="30" ry="17"
           fill="url(#cheekR)"/>

  <g id="mouth-group"></g>

</svg>
</div>

<div id="viseme-badge">sil</div>

<div class="controls">
  <button id="play-btn">&#9654; Play</button>
  <div class="speed-group">
    <button data-speed="0.5">0.5&times;</button>
    <button data-speed="1" class="active">1&times;</button>
    <button data-speed="2">2&times;</button>
  </div>
</div>

<div id="timeline"><div id="timeline-fill"></div></div>

<p class="grid-title">All 15 visemes</p>
<div class="grid" id="grid"></div>

<script src="outputs/lipsync/lipsync_data.js"></script>
<script>
// ── Viseme metadata (for grid display) ───────────────────────────────────────
const VISEMES = [
  { id: 'sil', phones: 'silence' }, { id: 'PP',  phones: 'p b m'   },
  { id: 'FF',  phones: 'f v'     }, { id: 'TH',  phones: 'th'      },
  { id: 'DD',  phones: 't d'     }, { id: 'kk',  phones: 'k g'     },
  { id: 'CH',  phones: 'ch sh j' }, { id: 'SS',  phones: 's z'     },
  { id: 'nn',  phones: 'n l'     }, { id: 'RR',  phones: 'r'       },
  { id: 'aa',  phones: 'ah aa'   }, { id: 'E',   phones: 'eh ey'   },
  { id: 'I',   phones: 'ih iy'   }, { id: 'O',   phones: 'oh ow'   },
  { id: 'U',   phones: 'oo uw'   },
];

// ── Viseme shape parameters — mirrors svg_generator.py VISEMES dict ──────────
// Each shape: [jaw_open, lip_spread, lip_part]
const VISEME_SHAPES = {
  sil: [0.00,  0.00,  0.00],
  PP:  [0.00,  0.00, -0.20],
  FF:  [0.05,  0.15,  0.20],
  TH:  [0.10,  0.00,  0.30],
  DD:  [0.15,  0.10,  0.30],
  kk:  [0.20,  0.00,  0.25],
  CH:  [0.12, -0.35,  0.28],
  SS:  [0.05,  0.50,  0.12],
  nn:  [0.10,  0.05,  0.20],
  RR:  [0.15, -0.28,  0.25],
  aa:  [0.85,  0.15,  0.80],
  E:   [0.40,  0.30,  0.50],
  I:   [0.05,  0.55,  0.10],
  O:   [0.45, -0.40,  0.52],
  U:   [0.18, -0.65,  0.28],
};

// ── Mouth geometry — JS port of svg_generator.compute_mouth() ────────────────
const MOUTH_CX = 256, MOUTH_CY = 340, MW = 54, MH = 10;

function computeMouthGeom(jaw, spread, part) {
  const spreadDx = spread * MW * 0.38;
  const lx = MOUTH_CX - MW + spreadDx;
  const rx = MOUTH_CX + MW - spreadDx;
  const jawDy = jaw * 52;
  const cornerY = MOUTH_CY + (-spread * 6);
  const upperOpen = part >= 0 ? part * MH * 0.9  : part * MH * 0.4;
  const lowerOpen = part >= 0 ? part * MH * 1.4  : part * MH * 0.6;
  const puckerDy  = Math.max(0, -spread) * 5;
  return {
    lx, rx,
    upperTopY: cornerY - MH * 1.2 - upperOpen - puckerDy,
    upperBotY: cornerY - upperOpen,
    lowerTopY: cornerY + jawDy + lowerOpen,
    lowerBotY: cornerY + jawDy + MH * 1.2 + lowerOpen,
    cornerY,
    cs: (rx - lx) * 0.28,
    jaw, spread, part,
  };
}

function p(x, y) { return `${x.toFixed(1)},${y.toFixed(1)}`; }

function upperLipPath(m) {
  const {lx, rx, upperTopY: top, upperBotY: bot, cornerY: cy, cs} = m;
  const cx = (lx + rx) / 2;
  return (
    `M ${p(lx, cy)}` +
    ` C ${p(lx+cs, top+4)} ${p(cx-(rx-lx)*0.22-8, top-2)} ${p(cx, top+5)}` +
    ` C ${p(cx+(rx-lx)*0.22+8, top-2)} ${p(rx-cs, top+4)} ${p(rx, cy)}` +
    ` C ${p(rx-cs*0.6, bot)} ${p(lx+cs*0.6, bot)} ${p(lx, cy)} Z`
  );
}

function lowerLipPath(m) {
  const {lx, rx, lowerTopY: top, lowerBotY: bot, cornerY: cy, cs} = m;
  return (
    `M ${p(lx, cy)}` +
    ` C ${p(lx+cs*0.6, top)} ${p(rx-cs*0.6, top)} ${p(rx, cy)}` +
    ` C ${p(rx-cs, bot)} ${p(lx+cs, bot)} ${p(lx, cy)} Z`
  );
}

function cavityPath(m) {
  const gap = m.lowerTopY - m.upperBotY;
  if (gap < 4) return null;
  const {lx, rx, upperBotY: ut, lowerTopY: ub, cs} = m;
  const cx = (lx + rx) / 2, my = (ut + ub) / 2;
  return (
    `M ${p(lx, my)}` +
    ` C ${p(cx-cs, ut)} ${p(cx+cs, ut)} ${p(rx, my)}` +
    ` C ${p(cx+cs, ub)} ${p(cx-cs, ub)} ${p(lx, my)} Z`
  );
}

function teethPath(m) {
  const gap = m.lowerTopY - m.upperBotY;
  if (gap < 6) return null;
  const lx = m.lx + 6, rx = m.rx - 6;
  const top = m.upperBotY + 1;
  const bot = Math.min(m.lowerTopY - 1, top + gap * 0.45);
  if (bot <= top) return null;
  const cx = (lx + rx) / 2, cs = (rx - lx) * 0.15;
  return (
    `M ${p(lx, top)}` +
    ` C ${p(cx-cs, top-2)} ${p(cx+cs, top-2)} ${p(rx, top)}` +
    ` L ${p(rx, bot)}` +
    ` C ${p(cx+cs, bot+2)} ${p(cx-cs, bot+2)} ${p(lx, bot)} Z`
  );
}

function tonguePath(m) {
  const gap = m.lowerTopY - m.upperBotY;
  if (gap < 20 || m.jaw < 0.35) return null;
  const top = m.upperBotY + gap * 0.55, bot = m.lowerTopY - 2;
  if (bot <= top) return null;
  const hw = (m.rx - m.lx) * 0.30;
  return (
    `M ${p(MOUTH_CX-hw, bot)}` +
    ` C ${p(MOUTH_CX-hw*1.1, top)} ${p(MOUTH_CX+hw*1.1, top)} ${p(MOUTH_CX+hw, bot)}` +
    ` C ${p(MOUTH_CX+hw*0.5, bot+8)} ${p(MOUTH_CX-hw*0.5, bot+8)} ${p(MOUTH_CX-hw, bot)} Z`
  );
}

function buildMouthSVG(jaw, spread, part) {
  const m = computeMouthGeom(jaw, spread, part);
  const cavity  = cavityPath(m);
  const teeth   = teethPath(m);
  const tongue  = tonguePath(m);
  const ul      = upperLipPath(m);
  const ll      = lowerLipPath(m);
  const cx      = (m.lx + m.rx) / 2;
  const hiliteRx = ((m.rx - m.lx) / 2) * 0.4;

  let svg = '';
  if (cavity) svg += `<path d="${cavity}" fill="#1A0A08" fill-opacity="0.88"/>`;
  if (teeth)  svg += `<path d="${teeth}"  fill="#F5F0E8"/>`;
  if (tongue) svg += `<path d="${tongue}" fill="#C85050" fill-opacity="0.90"/>`;
  svg += `<path d="${ul}" fill="#D4806A" stroke="#2A1A0A" stroke-width="2" stroke-linejoin="round"/>`;
  svg += `<path d="${ll}" fill="#C06050" stroke="#2A1A0A" stroke-width="2" stroke-linejoin="round"/>`;
  svg += `<ellipse cx="${cx.toFixed(1)}" cy="${m.upperTopY.toFixed(1)}" rx="${hiliteRx.toFixed(1)}" ry="3" fill="white" fill-opacity="0.30"/>`;
  return svg;
}

// ── Lipsync data ──────────────────────────────────────────────────────────────
const TIMELINE = window.LIPSYNC_DATA ? window.LIPSYNC_DATA.timeline : [];
const audio = document.getElementById('audio');
if (window.LIPSYNC_DATA) {
  audio.src = window.LIPSYNC_DATA.audio;
  document.getElementById('sentence-text').textContent =
    '\u201c' + window.LIPSYNC_DATA.sentence + '\u201d';
}

// ── Transition interpolation ──────────────────────────────────────────────────
const TRANSITION_MS = 55;  // blend window on each viseme change

function lerp(a, b, t) { return a + (b - a) * t; }
function smoothstep(t)  { t = Math.max(0, Math.min(1, t)); return t * t * (3 - 2 * t); }

let prevShape  = [0, 0, 0];
let targShape  = [0, 0, 0];
let interpShape = [0, 0, 0];
let transStart = -Infinity;
let targetViseme = 'sil';

// ── DOM refs ──────────────────────────────────────────────────────────────────
const mouthGroup = document.getElementById('mouth-group');
const badge      = document.getElementById('viseme-badge');
const fill       = document.getElementById('timeline-fill');
const playBtn    = document.getElementById('play-btn');

// Build viseme grid
const grid = document.getElementById('grid'), cells = {};
for (const {id, phones} of VISEMES) {
  const c = document.createElement('div');
  c.className = 'grid-cell';
  c.innerHTML = `<img src="outputs/svg_visemes/${id}.svg" alt="${id}"/>` +
                `<div class="name">${id}</div><div class="phones">${phones}</div>`;
  grid.appendChild(c); cells[id] = c;
}

function visemeAt(ms) {
  for (const f of TIMELINE) {
    if (ms >= f.start_ms && ms < f.end_ms) return f.viseme;
  }
  return 'sil';
}

// Seed
mouthGroup.innerHTML = buildMouthSVG(0, 0, 0);

function render() {
  const ms = audio.currentTime * 1000;
  const v  = visemeAt(ms);

  // Badge + grid — track target viseme
  if (v !== targetViseme) {
    if (cells[targetViseme]) cells[targetViseme].classList.remove('active');
    if (cells[v])            cells[v].classList.add('active');
    badge.textContent = v;

    // Begin transition: snapshot current interpolated position as new prev
    prevShape  = [...interpShape];
    targShape  = VISEME_SHAPES[v] || VISEME_SHAPES.sil;
    transStart = ms;
    targetViseme = v;
  }

  // Compute smoothstep blend
  const t = smoothstep(Math.min(1, (ms - transStart) / TRANSITION_MS));
  interpShape = [
    lerp(prevShape[0], targShape[0], t),
    lerp(prevShape[1], targShape[1], t),
    lerp(prevShape[2], targShape[2], t),
  ];

  mouthGroup.innerHTML = buildMouthSVG(...interpShape);

  if (audio.duration) {
    fill.style.width = (audio.currentTime / audio.duration * 100).toFixed(1) + '%';
  }
  requestAnimationFrame(render);
}
requestAnimationFrame(render);

audio.addEventListener('ended', () => {
  targShape  = VISEME_SHAPES.sil;
  transStart = audio.currentTime * 1000;
  fill.style.width = '0%';
  playBtn.innerHTML = '&#9654; Play';
});

playBtn.addEventListener('click', function() {
  if (audio.paused || audio.ended) {
    if (audio.ended) audio.currentTime = 0;
    audio.play();
    this.innerHTML = '&#9646;&#9646; Pause';
  } else {
    audio.pause();
    this.innerHTML = '&#9654; Play';
  }
});

document.querySelectorAll('.speed-group button').forEach(btn => {
  btn.addEventListener('click', () => {
    audio.playbackRate = parseFloat(btn.dataset.speed);
    document.querySelectorAll('.speed-group button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});
</script>
</body>
</html>
