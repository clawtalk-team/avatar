<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" fill="#E8F4F8" rx="20"/>
  
  <!-- Shoulders -->
  <ellipse cx="256" cy="510" rx="160" ry="80" fill="#4A90D9"/>
  
  <!-- Neck -->
  <rect x="224" y="380" width="64" height="60" rx="10" fill="#F5C4A1"/>
  
  <!-- Neck shadow -->
  <rect x="224" y="380" width="64" height="20" rx="5" fill="#E8AD8C" opacity="0.5"/>
  
  <!-- Hair back (behind head) -->
  <ellipse cx="256" cy="175" rx="140" ry="145" fill="#6B4226"/>
  
  <!-- Face -->
  <ellipse cx="256" cy="250" rx="120" ry="140" fill="#F5C4A1"/>
  
  <!-- Face outline -->
  <ellipse cx="256" cy="250" rx="120" ry="140" fill="none" stroke="#3D2B1F" stroke-width="3"/>
  
  <!-- Ears -->
  <ellipse cx="132" cy="260" rx="22" ry="30" fill="#F5C4A1" stroke="#3D2B1F" stroke-width="3"/>
  <ellipse cx="132" cy="262" rx="12" ry="18" fill="#E8AD8C"/>
  <ellipse cx="380" cy="260" rx="22" ry="30" fill="#F5C4A1" stroke="#3D2B1F" stroke-width="3"/>
  <ellipse cx="380" cy="262" rx="12" ry="18" fill="#E8AD8C"/>
  
  <!-- Hair top -->
  <path d="M136 210 Q136 100 256 90 Q376 100 376 210 Q370 160 310 140 Q280 130 256 135 Q232 130 202 140 Q142 160 136 210 Z" fill="#6B4226" stroke="#3D2B1F" stroke-width="3"/>
  
  <!-- Hair bangs -->
  <path d="M150 200 Q160 140 200 125 Q230 115 256 120 Q282 115 312 125 Q352 140 362 200 Q350 170 310 155 Q280 145 256 148 Q232 145 202 155 Q162 170 150 200 Z" fill="#7D5233"/>
  
  <!-- Hair side left -->
  <path d="M136 210 Q130 240 134 270 Q138 240 145 220 Z" fill="#6B4226"/>
  
  <!-- Hair side right -->
  <path d="M376 210 Q382 240 378 270 Q374 240 367 220 Z" fill="#6B4226"/>
  
  <!-- Eyebrows -->
  <path d="M185 205 Q205 190 230 198" stroke="#3D2B1F" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M327 205 Q307 190 282 198" stroke="#3D2B1F" stroke-width="5" stroke-linecap="round" fill="none"/>
  
  <!-- Eye whites - left -->
  <ellipse cx="210" cy="240" rx="30" ry="28" fill="white" stroke="#3D2B1F" stroke-width="2.5"/>
  
  <!-- Eye whites - right -->
  <ellipse cx="302" cy="240" rx="30" ry="28" fill="white" stroke="#3D2B1F" stroke-width="2.5"/>
  
  <!-- Iris - left -->
  <ellipse cx="214" cy="243" rx="18" ry="19" fill="#5B8C5A"/>
  
  <!-- Iris - right -->
  <ellipse cx="306" cy="243" rx="18" ry="19" fill="#5B8C5A"/>
  
  <!-- Pupil - left -->
  <ellipse cx="216" cy="245" rx="9" ry="10" fill="#1A1A2E"/>
  
  <!-- Pupil - right -->
  <ellipse cx="308" cy="245" rx="9" ry="10" fill="#1A1A2E"/>
  
  <!-- Eye shine - left -->
  <ellipse cx="222" cy="237" rx="5" ry="5" fill="white" opacity="0.9"/>
  
  <!-- Eye shine - right -->
  <ellipse cx="314" cy="237" rx="5" ry="5" fill="white" opacity="0.9"/>
  
  <!-- Nose -->
  <path d="M250 285 Q256 298 262 285" stroke="#D4956B" stroke-width="3" stroke-linecap="round" fill="none"/>
  
  <!-- Cheek blush left -->
  <ellipse cx="175" cy="300" rx="22" ry="14" fill="#F4A0A0" opacity="0.35"/>
  
  <!-- Cheek blush right -->
  <ellipse cx="337" cy="300" rx="22" ry="14" fill="#F4A0A0" opacity="0.35"/>
  
  <!-- Mouth - Viseme "I": barely open, lips wide and tightly spread -->
  <!-- Outer mouth shape - wide spread, barely open -->
  <path d="M210 330 Q220 326 235 324 Q248 322 256 322 Q264 322 277 324 Q292 326 302 330 Q292 338 277 340 Q264 342 256 342 Q248 342 235 340 Q220 338 210 330 Z" fill="#2D1A1A" stroke="#3D2B1F" stroke-width="2.5"/>
  
  <!-- Upper lip line -->
  <path d="M210 330 Q230 325 256 323 Q282 325 302 330" fill="none" stroke="#3D2B1F" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Lower lip line -->
  <path d="M210 330 Q230 339 256 341 Q282 339 302 330" fill="none" stroke="#3D2B1F" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Teeth hint - upper teeth visible through narrow opening -->
  <path d="M218 330 Q235 327 256 326 Q277 327 294 330 Q277 332 256 333 Q235 332 218 330 Z" fill="white" opacity="0.85"/>
  
  <!-- Upper lip -->
  <path d="M208 330 Q225 322 240 320 Q248 318 256 318 Q264 318 272 320 Q287 322 304 330 Q287 327 272 325 Q264 324 256 324 Q248 324 240 325 Q225 327 208 330 Z" fill="#E8907A" stroke="none"/>
  
  <!-- Lower lip -->
  <path d="M208 330 Q225 338 240 341 Q248 343 256 343 Q264 343 272 341 Q287 338 304 330 Q287 335 272 337 Q264 338 256 338 Q248 338 240 337 Q225 335 208 330 Z" fill="#D9796A" stroke="none"/>
  
  <!-- Lip corners - tight spread emphasis -->
  <circle cx="208" cy="330" r="2" fill="#C46B5C"/>
  <circle cx="304" cy="330" r="2" fill="#C46B5C"/>
</svg>